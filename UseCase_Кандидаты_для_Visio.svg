<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .label { font: 16px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .actor { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .boundary { stroke: #374151; stroke-width: 2; fill: #f9fafb; rx: 18; }
      .usecase { stroke: #2563eb; stroke-width: 2.5; fill: #eff6ff; }
      .admincase { stroke: #7c3aed; stroke-width: 2.5; fill: #f5f3ff; }
      .hrcase { stroke: #059669; stroke-width: 2.5; fill: #ecfdf5; }
      .line { stroke: #4b5563; stroke-width: 2; fill: none; }
      .include { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .note { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #7c2d12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>
  <text x="700" y="48" text-anchor="middle" class="title">Use Case: Веб-приложение учета кандидатов</text>

  <rect x="300" y="90" width="800" height="720" class="boundary"/>
  <text x="700" y="125" text-anchor="middle" class="label">Система учета кандидатов для приема на службу</text>

  <!-- Candidate actor -->
  <circle cx="120" cy="180" r="24" class="actor"/>
  <line x1="120" y1="204" x2="120" y2="275" class="actor"/>
  <line x1="72" y1="230" x2="168" y2="230" class="actor"/>
  <line x1="120" y1="275" x2="80" y2="340" class="actor"/>
  <line x1="120" y1="275" x2="160" y2="340" class="actor"/>
  <text x="120" y="375" text-anchor="middle" class="label">Кандидат</text>

  <!-- HR actor -->
  <circle cx="1260" cy="190" r="24" class="actor"/>
  <line x1="1260" y1="214" x2="1260" y2="285" class="actor"/>
  <line x1="1212" y1="240" x2="1308" y2="240" class="actor"/>
  <line x1="1260" y1="285" x2="1220" y2="350" class="actor"/>
  <line x1="1260" y1="285" x2="1300" y2="350" class="actor"/>
  <text x="1260" y="385" text-anchor="middle" class="label">Кадровик</text>

  <!-- Admin actor -->
  <circle cx="1260" cy="590" r="24" class="actor"/>
  <line x1="1260" y1="614" x2="1260" y2="685" class="actor"/>
  <line x1="1212" y1="640" x2="1308" y2="640" class="actor"/>
  <line x1="1260" y1="685" x2="1220" y2="750" class="actor"/>
  <line x1="1260" y1="685" x2="1300" y2="750" class="actor"/>
  <text x="1260" y="785" text-anchor="middle" class="label">Администратор</text>

  <!-- Candidate use cases -->
  <ellipse cx="510" cy="200" rx="150" ry="42" class="usecase"/>
  <text x="510" y="196" text-anchor="middle" class="label">Заполнить</text>
  <text x="510" y="216" text-anchor="middle" class="label">анкету</text>

  <ellipse cx="510" cy="305" rx="150" ry="42" class="usecase"/>
  <text x="510" y="301" text-anchor="middle" class="label">Сохранить</text>
  <text x="510" y="321" text-anchor="middle" class="label">черновик</text>

  <ellipse cx="510" cy="410" rx="150" ry="42" class="usecase"/>
  <text x="510" y="406" text-anchor="middle" class="label">Отправить</text>
  <text x="510" y="426" text-anchor="middle" class="label">заявление</text>

  <ellipse cx="510" cy="515" rx="150" ry="42" class="usecase"/>
  <text x="510" y="511" text-anchor="middle" class="label">Просмотреть</text>
  <text x="510" y="531" text-anchor="middle" class="label">статус</text>

  <!-- HR use cases -->
  <ellipse cx="875" cy="180" rx="160" ry="42" class="hrcase"/>
  <text x="875" y="176" text-anchor="middle" class="label">Просмотреть список</text>
  <text x="875" y="196" text-anchor="middle" class="label">кандидатов</text>

  <ellipse cx="875" cy="285" rx="160" ry="42" class="hrcase"/>
  <text x="875" y="281" text-anchor="middle" class="label">Вести карточку</text>
  <text x="875" y="301" text-anchor="middle" class="label">кандидата</text>

  <ellipse cx="875" cy="390" rx="160" ry="42" class="hrcase"/>
  <text x="875" y="386" text-anchor="middle" class="label">Заполнить проверки</text>
  <text x="875" y="406" text-anchor="middle" class="label">и результаты</text>

  <ellipse cx="875" cy="495" rx="160" ry="42" class="hrcase"/>
  <text x="875" y="491" text-anchor="middle" class="label">Изменить стадию</text>
  <text x="875" y="511" text-anchor="middle" class="label">изучения</text>

  <ellipse cx="875" cy="600" rx="160" ry="42" class="hrcase"/>
  <text x="875" y="596" text-anchor="middle" class="label">Сформировать</text>
  <text x="875" y="616" text-anchor="middle" class="label">Excel-отчет</text>

  <!-- Admin use cases -->
  <ellipse cx="690" cy="690" rx="165" ry="42" class="admincase"/>
  <text x="690" y="686" text-anchor="middle" class="label">Управлять</text>
  <text x="690" y="706" text-anchor="middle" class="label">справочниками</text>

  <ellipse cx="690" cy="770" rx="165" ry="42" class="admincase"/>
  <text x="690" y="766" text-anchor="middle" class="label">Управлять</text>
  <text x="690" y="786" text-anchor="middle" class="label">пользователями</text>

  <!-- Actor associations -->
  <line x1="170" y1="220" x2="360" y2="200" class="line"/>
  <line x1="170" y1="245" x2="360" y2="305" class="line"/>
  <line x1="170" y1="275" x2="360" y2="410" class="line"/>
  <line x1="170" y1="310" x2="360" y2="515" class="line"/>

  <line x1="1210" y1="220" x2="1035" y2="180" class="line"/>
  <line x1="1210" y1="245" x2="1035" y2="285" class="line"/>
  <line x1="1210" y1="270" x2="1035" y2="390" class="line"/>
  <line x1="1210" y1="295" x2="1035" y2="495" class="line"/>
  <line x1="1210" y1="325" x2="1035" y2="600" class="line"/>

  <line x1="1210" y1="630" x2="855" y2="690" class="line"/>
  <line x1="1210" y1="665" x2="855" y2="770" class="line"/>

  <!-- Include relationships -->
  <line x1="625" y1="410" x2="745" y2="285" class="include"/>
  <text x="665" y="335" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="875" y1="327" x2="875" y2="348" class="include"/>
  <text x="900" y="344" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="875" y1="537" x2="875" y2="558" class="include"/>
  <text x="900" y="554" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Note -->
  <rect x="330" y="835" width="740" height="42" class="note"/>
  <text x="700" y="861" text-anchor="middle" class="noteText">Экспорт формирует файл .xlsx по структуре исходного ежемесячного отчета до 20 числа.</text>
</svg>
