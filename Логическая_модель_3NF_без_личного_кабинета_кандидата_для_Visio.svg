  <text x="82" y="483" class="key">ID образования</text>
  <text x="82" y="508" class="attr">ID кандидата</text>
  <text x="82" y="533" class="attr">Уровень образования</text>
  <text x="82" y="558" class="attr">Вид образования</text>
  <text x="82" y="583" class="attr">Учебное заведение</text>
  <text x="82" y="608" class="attr">Документ</text>

