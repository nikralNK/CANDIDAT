  <text x="1342" y="821" class="attr">ID службы</text>
  <text x="1342" y="848" class="attr">ID подразделения</text>
  <text x="1342" y="875" class="attr">ID должности</text>
  <text x="1342" y="902" class="attr">Активность</text>

