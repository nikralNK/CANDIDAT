<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1250" viewBox="0 0 1900 1250">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .boundary { fill: #f9fafb; stroke: #374151; stroke-width: 2.5; rx: 18; }
      .actor { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .candidate { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.1; }
      .hr { fill: #ecfdf5; stroke: #059669; stroke-width: 2.1; }
      .admin { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.1; }
      .system { fill: #fff7ed; stroke: #f97316; stroke-width: 2.1; }
      .label { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .section { font: 700 17px Arial, sans-serif; fill: #111827; }
      .assoc { stroke: #4b5563; stroke-width: 1.8; fill: none; }
      .include { stroke: #2563eb; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowBlue); }
      .extend { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowRed); }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="page" width="1900" height="1250"/>
  <text x="950" y="42" text-anchor="middle" class="title">Use Case со связями include / extend</text>
  <text x="950" y="70" text-anchor="middle" class="subtitle">Система учета кандидатов: обязательные действия показаны через include, условные действия через extend</text>

  <rect x="240" y="105" width="1440" height="1040" class="boundary"/>
  <text x="960" y="135" text-anchor="middle" class="section">Веб-приложение учета кандидатов для приема на службу</text>

  <!-- Actors -->
  <circle cx="105" cy="270" r="25" class="actor"/>
  <line x1="105" y1="295" x2="105" y2="375" class="actor"/>
  <line x1="55" y1="325" x2="155" y2="325" class="actor"/>
  <line x1="105" y1="375" x2="62" y2="445" class="actor"/>
  <line x1="105" y1="375" x2="148" y2="445" class="actor"/>
  <text x="105" y="480" text-anchor="middle" class="label">Кандидат</text>

  <circle cx="1795" cy="430" r="25" class="actor"/>
  <line x1="1795" y1="455" x2="1795" y2="535" class="actor"/>
  <line x1="1745" y1="485" x2="1845" y2="485" class="actor"/>
  <line x1="1795" y1="535" x2="1752" y2="605" class="actor"/>
  <line x1="1795" y1="535" x2="1838" y2="605" class="actor"/>
  <text x="1795" y="640" text-anchor="middle" class="label">Кадровик</text>

  <circle cx="1795" cy="875" r="25" class="actor"/>
  <line x1="1795" y1="900" x2="1795" y2="980" class="actor"/>
  <line x1="1745" y1="930" x2="1845" y2="930" class="actor"/>
  <line x1="1795" y1="980" x2="1752" y2="1050" class="actor"/>
  <line x1="1795" y1="980" x2="1838" y2="1050" class="actor"/>
  <text x="1795" y="1085" text-anchor="middle" class="label">Администратор</text>

  <!-- Candidate use cases -->
  <text x="445" y="185" text-anchor="middle" class="section">Кандидат</text>

  <ellipse cx="445" cy="250" rx="155" ry="38" class="candidate"/>
  <text x="445" y="245" text-anchor="middle" class="label">Выбрать категорию</text>
  <text x="445" y="265" text-anchor="middle" class="label">службы</text>

  <ellipse cx="445" cy="355" rx="155" ry="38" class="candidate"/>
  <text x="445" y="350" text-anchor="middle" class="label">Выбрать подразделение</text>
  <text x="445" y="370" text-anchor="middle" class="label">и должность</text>

  <ellipse cx="445" cy="470" rx="155" ry="38" class="candidate"/>
  <text x="445" y="465" text-anchor="middle" class="label">Отправить анкету</text>
  <text x="445" y="485" text-anchor="middle" class="label">кадровику</text>

  <ellipse cx="445" cy="585" rx="155" ry="38" class="candidate"/>
  <text x="445" y="580" text-anchor="middle" class="label">Просмотреть статус</text>
  <text x="445" y="600" text-anchor="middle" class="label">оформления</text>

  <!-- Internal candidate/system use cases -->
  <ellipse cx="780" cy="355" rx="165" ry="38" class="system"/>
  <text x="780" y="350" text-anchor="middle" class="label">Фильтровать должности</text>
  <text x="780" y="370" text-anchor="middle" class="label">по категории</text>

  <ellipse cx="780" cy="470" rx="165" ry="38" class="system"/>
  <text x="780" y="465" text-anchor="middle" class="label">Проверить</text>
  <text x="780" y="485" text-anchor="middle" class="label">обязательные поля</text>

  <!-- HR use cases -->
  <text x="1130" y="185" text-anchor="middle" class="section">Кадровик</text>

  <ellipse cx="1130" cy="250" rx="165" ry="38" class="hr"/>
  <text x="1130" y="245" text-anchor="middle" class="label">Проверить полноту</text>
  <text x="1130" y="265" text-anchor="middle" class="label">анкеты</text>

  <ellipse cx="1130" cy="355" rx="165" ry="38" class="hr"/>
  <text x="1130" y="350" text-anchor="middle" class="label">Принять анкету</text>
  <text x="1130" y="370" text-anchor="middle" class="label">в работу</text>

  <ellipse cx="1130" cy="470" rx="165" ry="38" class="hr"/>
  <text x="1130" y="465" text-anchor="middle" class="label">Внести этапы</text>
  <text x="1130" y="485" text-anchor="middle" class="label">и проверки</text>

  <ellipse cx="1130" cy="585" rx="165" ry="38" class="hr"/>
  <text x="1130" y="580" text-anchor="middle" class="label">Принять решение</text>
  <text x="1130" y="600" text-anchor="middle" class="label">по кандидату</text>

  <ellipse cx="1130" cy="700" rx="165" ry="38" class="system"/>
  <text x="1130" y="695" text-anchor="middle" class="label">Запустить автоформирование</text>
  <text x="1130" y="715" text-anchor="middle" class="label">Excel-отчета</text>

  <!-- HR optional/internal use cases -->
  <ellipse cx="1455" cy="250" rx="155" ry="38" class="hr"/>
  <text x="1455" y="245" text-anchor="middle" class="label">Вернуть анкету</text>
  <text x="1455" y="265" text-anchor="middle" class="label">на доработку</text>

  <ellipse cx="1455" cy="355" rx="155" ry="38" class="system"/>
  <text x="1455" y="350" text-anchor="middle" class="label">Создать карточку</text>
  <text x="1455" y="370" text-anchor="middle" class="label">оформления</text>

  <ellipse cx="1455" cy="525" rx="155" ry="38" class="hr"/>
  <text x="1455" y="520" text-anchor="middle" class="label">Указать причину</text>
  <text x="1455" y="540" text-anchor="middle" class="label">отказа</text>

  <ellipse cx="1455" cy="645" rx="155" ry="38" class="hr"/>
  <text x="1455" y="640" text-anchor="middle" class="label">Указать реквизиты</text>
  <text x="1455" y="660" text-anchor="middle" class="label">приказа</text>

  <ellipse cx="1455" cy="765" rx="155" ry="38" class="system"/>
  <text x="1455" y="760" text-anchor="middle" class="label">Заполнить</text>
  <text x="1455" y="780" text-anchor="middle" class="label">Excel-шаблон</text>

  <!-- Admin use cases -->
  <text x="560" y="820" text-anchor="middle" class="section">Администратор</text>

  <ellipse cx="430" cy="890" rx="160" ry="38" class="admin"/>
  <text x="430" y="885" text-anchor="middle" class="label">Создать / изменить</text>
  <text x="430" y="905" text-anchor="middle" class="label">пользователя</text>

  <ellipse cx="430" cy="1000" rx="160" ry="38" class="admin"/>
  <text x="430" y="995" text-anchor="middle" class="label">Заблокировать</text>
  <text x="430" y="1015" text-anchor="middle" class="label">пользователя</text>

  <ellipse cx="760" cy="890" rx="170" ry="38" class="admin"/>
  <text x="760" y="885" text-anchor="middle" class="label">Добавить / редактировать</text>
  <text x="760" y="905" text-anchor="middle" class="label">значение справочника</text>

  <ellipse cx="760" cy="1000" rx="170" ry="38" class="admin"/>
  <text x="760" y="995" text-anchor="middle" class="label">Настроить связи</text>
  <text x="760" y="1015" text-anchor="middle" class="label">справочников</text>

  <ellipse cx="1120" cy="890" rx="170" ry="38" class="admin"/>
  <text x="1120" y="885" text-anchor="middle" class="label">Настроить шаблон</text>
  <text x="1120" y="905" text-anchor="middle" class="label">отчета</text>

  <ellipse cx="1455" cy="890" rx="155" ry="38" class="system"/>
  <text x="1455" y="885" text-anchor="middle" class="label">Настроить соответствие</text>
  <text x="1455" y="905" text-anchor="middle" class="label">колонок Excel</text>

  <!-- Associations -->
  <line x1="155" y1="305" x2="290" y2="250" class="assoc"/>
  <line x1="155" y1="330" x2="290" y2="355" class="assoc"/>
  <line x1="155" y1="365" x2="290" y2="470" class="assoc"/>
  <line x1="155" y1="400" x2="290" y2="585" class="assoc"/>

  <line x1="1745" y1="430" x2="1295" y2="250" class="assoc"/>
  <line x1="1745" y1="455" x2="1295" y2="355" class="assoc"/>
  <line x1="1745" y1="485" x2="1295" y2="470" class="assoc"/>
  <line x1="1745" y1="515" x2="1295" y2="585" class="assoc"/>
  <line x1="1745" y1="545" x2="1295" y2="700" class="assoc"/>

  <line x1="1745" y1="880" x2="590" y2="890" class="assoc"/>
  <line x1="1745" y1="905" x2="590" y2="1000" class="assoc"/>
  <line x1="1745" y1="930" x2="930" y2="890" class="assoc"/>
  <line x1="1745" y1="955" x2="930" y2="1000" class="assoc"/>
  <line x1="1745" y1="980" x2="1290" y2="890" class="assoc"/>

  <!-- Include relationships -->
  <line x1="600" y1="355" x2="615" y2="355" class="include"/>
  <text x="618" y="342" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="600" y1="470" x2="615" y2="470" class="include"/>
  <text x="618" y="457" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="1295" y1="355" x2="1300" y2="355" class="include"/>
  <text x="1302" y="342" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="1295" y1="700" x2="1315" y2="750" class="include"/>
  <text x="1310" y="720" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="1290" y1="890" x2="1300" y2="890" class="include"/>
  <text x="1302" y="877" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="760" y1="962" x2="760" y2="928" class="include"/>
  <text x="780" y="948" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Extend relationships -->
  <line x1="1300" y1="250" x2="1295" y2="250" class="extend"/>
  <text x="1310" y="235" class="small">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1302" y1="535" x2="1285" y2="585" class="extend"/>
  <text x="1305" y="560" class="small">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1302" y1="635" x2="1285" y2="585" class="extend"/>
  <text x="1305" y="620" class="small">&lt;&lt;extend&gt;&gt;</text>

  <!-- Legend -->
  <rect x="270" y="1110" width="590" height="90" class="note"/>
  <text x="295" y="1140" class="noteText">Синяя пунктирная стрелка <<include>>: действие выполняется обязательно.</text>
  <text x="295" y="1168" class="noteText">Красная пунктирная стрелка <<extend>>: действие выполняется только при условии.</text>

  <rect x="960" y="1110" width="610" height="90" class="note"/>
  <text x="985" y="1140" class="noteText">Пример include: при отправке анкеты система всегда проверяет обязательные поля.</text>
  <text x="985" y="1168" class="noteText">Пример extend: причина отказа заполняется только если кандидат получил отказ.</text>
</svg>
