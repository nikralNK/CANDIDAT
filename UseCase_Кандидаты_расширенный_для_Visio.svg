<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .boundary { fill: #f9fafb; stroke: #374151; stroke-width: 2.5; rx: 18; }
      .group { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.8; rx: 14; }
      .groupTitle { font: 700 17px Arial, sans-serif; fill: #111827; }
      .label { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #4b5563; }
      .actor { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .candidate { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.2; }
      .hr { fill: #ecfdf5; stroke: #059669; stroke-width: 2.2; }
      .admin { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.2; }
      .export { fill: #fff7ed; stroke: #f97316; stroke-width: 2.2; }
      .line { stroke: #4b5563; stroke-width: 1.8; fill: none; }
      .dashed { stroke: #6b7280; stroke-width: 1.8; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="page" width="1800" height="1200"/>
  <text x="900" y="42" text-anchor="middle" class="title">Расширенная Use Case диаграмма</text>
  <text x="900" y="70" text-anchor="middle" class="subtitle">Веб-приложение учета кандидатов и формирования Excel-отчета до 20 числа</text>

  <rect x="260" y="105" width="1280" height="1010" class="boundary"/>
  <text x="900" y="135" text-anchor="middle" class="groupTitle">Система учета кандидатов для приема на службу</text>

  <!-- Actors -->
  <circle cx="105" cy="220" r="25" class="actor"/>
  <line x1="105" y1="245" x2="105" y2="325" class="actor"/>
  <line x1="55" y1="275" x2="155" y2="275" class="actor"/>
  <line x1="105" y1="325" x2="62" y2="395" class="actor"/>
  <line x1="105" y1="325" x2="148" y2="395" class="actor"/>
  <text x="105" y="430" text-anchor="middle" class="label">Кандидат</text>

  <circle cx="1695" cy="245" r="25" class="actor"/>
  <line x1="1695" y1="270" x2="1695" y2="350" class="actor"/>
  <line x1="1645" y1="300" x2="1745" y2="300" class="actor"/>
  <line x1="1695" y1="350" x2="1652" y2="420" class="actor"/>
  <line x1="1695" y1="350" x2="1738" y2="420" class="actor"/>
  <text x="1695" y="455" text-anchor="middle" class="label">Кадровик</text>

  <circle cx="1695" cy="800" r="25" class="actor"/>
  <line x1="1695" y1="825" x2="1695" y2="905" class="actor"/>
  <line x1="1645" y1="855" x2="1745" y2="855" class="actor"/>
  <line x1="1695" y1="905" x2="1652" y2="975" class="actor"/>
  <line x1="1695" y1="905" x2="1738" y2="975" class="actor"/>
  <text x="1695" y="1010" text-anchor="middle" class="label">Администратор</text>

  <!-- Candidate group -->
  <rect x="300" y="160" width="410" height="505" class="group"/>
  <text x="505" y="190" text-anchor="middle" class="groupTitle">Личный кабинет кандидата</text>

  <ellipse cx="505" cy="245" rx="145" ry="35" class="candidate"/>
  <text x="505" y="250" text-anchor="middle" class="label">Зарегистрироваться / войти</text>

  <ellipse cx="505" cy="325" rx="145" ry="35" class="candidate"/>
  <text x="505" y="320" text-anchor="middle" class="label">Заполнить личные</text>
  <text x="505" y="340" text-anchor="middle" class="label">данные</text>

  <ellipse cx="505" cy="405" rx="145" ry="35" class="candidate"/>
  <text x="505" y="400" text-anchor="middle" class="label">Указать образование</text>
  <text x="505" y="420" text-anchor="middle" class="label">и источник сведений</text>

  <ellipse cx="505" cy="485" rx="145" ry="35" class="candidate"/>
  <text x="505" y="480" text-anchor="middle" class="label">Выбрать подразделение</text>
  <text x="505" y="500" text-anchor="middle" class="label">и должность</text>

  <ellipse cx="505" cy="565" rx="145" ry="35" class="candidate"/>
  <text x="505" y="560" text-anchor="middle" class="label">Сохранить черновик</text>
  <text x="505" y="580" text-anchor="middle" class="label">анкеты</text>

  <ellipse cx="505" cy="630" rx="145" ry="35" class="candidate"/>
  <text x="505" y="625" text-anchor="middle" class="label">Отправить заявление</text>
  <text x="505" y="645" text-anchor="middle" class="label">кадровику</text>

  <!-- HR group -->
  <rect x="755" y="160" width="485" height="700" class="group"/>
  <text x="997" y="190" text-anchor="middle" class="groupTitle">Рабочее место кадровика</text>

  <ellipse cx="997" cy="245" rx="165" ry="35" class="hr"/>
  <text x="997" y="250" text-anchor="middle" class="label">Просмотреть новые заявления</text>

  <ellipse cx="997" cy="325" rx="165" ry="35" class="hr"/>
  <text x="997" y="320" text-anchor="middle" class="label">Проверить полноту</text>
  <text x="997" y="340" text-anchor="middle" class="label">анкеты</text>

  <ellipse cx="997" cy="405" rx="165" ry="35" class="hr"/>
  <text x="997" y="400" text-anchor="middle" class="label">Создать карточку</text>
  <text x="997" y="420" text-anchor="middle" class="label">оформления</text>

  <ellipse cx="997" cy="485" rx="165" ry="35" class="hr"/>
  <text x="997" y="480" text-anchor="middle" class="label">Заполнить должность,</text>
  <text x="997" y="500" text-anchor="middle" class="label">службу и категорию</text>

  <ellipse cx="997" cy="565" rx="165" ry="35" class="hr"/>
  <text x="997" y="560" text-anchor="middle" class="label">Вести этапы изучения:</text>
  <text x="997" y="580" text-anchor="middle" class="label">задание, испытания, ВВК, ППО</text>

  <ellipse cx="997" cy="645" rx="165" ry="35" class="hr"/>
  <text x="997" y="640" text-anchor="middle" class="label">Вести служебные проверки:</text>
  <text x="997" y="660" text-anchor="middle" class="label">ИЦ, ГИАЦ, ФСБ, ГИБДД и др.</text>

  <ellipse cx="997" cy="725" rx="165" ry="35" class="hr"/>
  <text x="997" y="720" text-anchor="middle" class="label">Принять решение:</text>
  <text x="997" y="740" text-anchor="middle" class="label">принят / отказ / на оформлении</text>

  <ellipse cx="997" cy="805" rx="165" ry="35" class="export"/>
  <text x="997" y="800" text-anchor="middle" class="label">Запустить автоматическое</text>
  <text x="997" y="820" text-anchor="middle" class="label">формирование Excel-отчета</text>

  <!-- Candidate status outside group but inside system -->
  <ellipse cx="505" cy="745" rx="145" ry="35" class="candidate"/>
  <text x="505" y="740" text-anchor="middle" class="label">Просмотреть статус</text>
  <text x="505" y="760" text-anchor="middle" class="label">оформления</text>

  <!-- Admin group -->
  <rect x="1285" y="590" width="220" height="340" class="group"/>
  <text x="1395" y="620" text-anchor="middle" class="groupTitle">Администрирование</text>

  <ellipse cx="1395" cy="685" rx="92" ry="35" class="admin"/>
  <text x="1395" y="680" text-anchor="middle" class="label">Управлять</text>
  <text x="1395" y="700" text-anchor="middle" class="label">пользователями</text>

  <ellipse cx="1395" cy="775" rx="92" ry="35" class="admin"/>
  <text x="1395" y="770" text-anchor="middle" class="label">Управлять</text>
  <text x="1395" y="790" text-anchor="middle" class="label">справочниками</text>

  <ellipse cx="1395" cy="865" rx="92" ry="35" class="admin"/>
  <text x="1395" y="860" text-anchor="middle" class="label">Настроить</text>
  <text x="1395" y="880" text-anchor="middle" class="label">шаблон отчета</text>

  <!-- External output -->
  <rect x="735" y="990" width="350" height="70" class="note"/>
  <text x="910" y="1018" text-anchor="middle" class="noteText">Выход системы: автоматически созданный</text>
  <text x="910" y="1040" text-anchor="middle" class="noteText">Excel-файл ежемесячного отчета</text>

  <!-- Actor associations -->
  <line x1="155" y1="250" x2="360" y2="245" class="line"/>
  <line x1="155" y1="275" x2="360" y2="325" class="line"/>
  <line x1="155" y1="305" x2="360" y2="405" class="line"/>
  <line x1="155" y1="335" x2="360" y2="485" class="line"/>
  <line x1="155" y1="365" x2="360" y2="565" class="line"/>
  <line x1="155" y1="395" x2="360" y2="630" class="line"/>
  <line x1="155" y1="420" x2="360" y2="745" class="line"/>

  <line x1="1645" y1="260" x2="1162" y2="245" class="line"/>
  <line x1="1645" y1="290" x2="1162" y2="325" class="line"/>
  <line x1="1645" y1="320" x2="1162" y2="405" class="line"/>
  <line x1="1645" y1="350" x2="1162" y2="485" class="line"/>
  <line x1="1645" y1="380" x2="1162" y2="565" class="line"/>
  <line x1="1645" y1="410" x2="1162" y2="645" class="line"/>
  <line x1="1645" y1="440" x2="1162" y2="725" class="line"/>
  <line x1="1645" y1="455" x2="1162" y2="805" class="line"/>

  <line x1="1645" y1="830" x2="1487" y2="685" class="line"/>
  <line x1="1645" y1="860" x2="1487" y2="775" class="line"/>
  <line x1="1645" y1="890" x2="1487" y2="865" class="line"/>

  <!-- Include / extend relationships -->
  <line x1="505" y1="280" x2="505" y2="290" class="dashed"/>
  <text x="525" y="292" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="505" y1="360" x2="505" y2="370" class="dashed"/>
  <text x="525" y="372" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="505" y1="440" x2="505" y2="450" class="dashed"/>
  <text x="525" y="452" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="650" y1="630" x2="832" y2="245" class="dashed"/>
  <text x="662" y="430" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="997" y1="280" x2="997" y2="290" class="dashed"/>
  <text x="1018" y="292" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="997" y1="360" x2="997" y2="370" class="dashed"/>
  <text x="1018" y="372" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="997" y1="520" x2="997" y2="530" class="dashed"/>
  <text x="1018" y="532" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="997" y1="600" x2="997" y2="610" class="dashed"/>
  <text x="1018" y="612" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="997" y1="760" x2="997" y2="770" class="dashed"/>
  <text x="1018" y="772" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="997" y1="840" x2="910" y2="990" class="dashed"/>
  <text x="944" y="930" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Legend -->
  <rect x="300" y="955" width="335" height="125" class="group"/>
  <text x="322" y="985" class="groupTitle">Легенда</text>
  <ellipse cx="360" cy="1018" rx="34" ry="13" class="candidate"/>
  <text x="415" y="1023" class="small">действия кандидата</text>
  <ellipse cx="360" cy="1048" rx="34" ry="13" class="hr"/>
  <text x="415" y="1053" class="small">действия кадровика</text>
  <ellipse cx="360" cy="1078" rx="34" ry="13" class="export"/>
  <text x="415" y="1083" class="small">автоматическое формирование Excel</text>
</svg>
