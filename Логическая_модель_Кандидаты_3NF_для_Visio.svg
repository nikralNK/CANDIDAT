<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1400" viewBox="0 0 1900 1400">
  <defs>
    <style>
      .page { fill: #fff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .entity { fill: #fff; stroke: #374151; stroke-width: 2; rx: 8; }
      .head { stroke: #374151; stroke-width: 2; }
      .blue { fill: #dbeafe; }
      .green { fill: #dcfce7; }
      .yellow { fill: #fef3c7; }
      .red { fill: #fee2e2; }
      .purple { fill: #ede9fe; }
      .orange { fill: #ffedd5; }
      .name { font: 700 16px Arial, sans-serif; fill: #111827; }
      .attr { font: 13px Arial, sans-serif; fill: #111827; }
      .key { font: 700 13px Arial, sans-serif; fill: #991b1b; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .rel { font: 12px Arial, sans-serif; fill: #374151; font-weight: 700; }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.6; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
