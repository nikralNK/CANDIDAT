  <text x="952" y="178" class="key">ID источника</text>
  <text x="952" y="203" class="attr">Наименование</text>

  <rect x="930" y="330" width="285" height="155" class="entity"/>
  <rect x="930" y="330" width="285" height="38" class="head green"/>
