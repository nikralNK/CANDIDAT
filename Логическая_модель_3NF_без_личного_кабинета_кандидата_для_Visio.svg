  <text x="1322" y="688" class="key">ID вакансии</text>
  <text x="1322" y="713" class="attr">ID категории</text>
  <text x="1322" y="738" class="attr">ID подразделения</text>
  <text x="1322" y="763" class="attr">ID службы</text>
