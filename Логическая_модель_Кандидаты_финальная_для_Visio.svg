<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1350" viewBox="0 0 1900 1350">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .entity { fill: #ffffff; stroke: #374151; stroke-width: 2.1; rx: 9; }
      .head { stroke: #374151; stroke-width: 2.1; }
      .blue { fill: #dbeafe; }
      .green { fill: #dcfce7; }
      .yellow { fill: #fef3c7; }
      .purple { fill: #ede9fe; }
      .red { fill: #fee2e2; }
      .orange { fill: #ffedd5; }
      .name { font: 700 17px Arial, sans-serif; fill: #111827; }
      .attr { font: 14px Arial, sans-serif; fill: #111827; }
      .key { font: 700 14px Arial, sans-serif; fill: #991b1b; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .rel { font: 13px Arial, sans-serif; fill: #374151; font-weight: 700; }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.7; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
  </defs>

  <rect class="page" width="1900" height="1350"/>
  <text x="950" y="42" text-anchor="middle" class="title">Финальная логическая модель данных</text>
  <text x="950" y="70" text-anchor="middle" class="subtitle">Кандидат выбирает данные из справочников, кадровик ведет оформление, система формирует Excel-отчет автоматически</text>

  <!-- User -->
  <rect x="60" y="120" width="310" height="220" class="entity"/>
  <rect x="60" y="120" width="310" height="40" class="head purple"/>
  <text x="215" y="146" text-anchor="middle" class="name">Пользователь</text>
  <text x="82" y="187" class="key">ID пользователя</text>
  <text x="82" y="214" class="attr">ФИО</text>
  <text x="82" y="241" class="attr">Логин</text>
  <text x="82" y="268" class="attr">Пароль</text>
  <text x="82" y="295" class="attr">Роль</text>
  <text x="82" y="322" class="attr">Статус учетной записи</text>

  <!-- Candidate -->
  <rect x="500" y="120" width="330" height="220" class="entity"/>
  <rect x="500" y="120" width="330" height="40" class="head blue"/>
  <text x="665" y="146" text-anchor="middle" class="name">Кандидат</text>
  <text x="522" y="187" class="key">ID кандидата</text>
  <text x="522" y="214" class="attr">ФИО</text>
  <text x="522" y="241" class="attr">Дата рождения</text>
  <text x="522" y="268" class="attr">Телефон</text>
  <text x="522" y="295" class="attr">Email</text>
  <text x="522" y="322" class="attr">ID пользователя</text>

  <!-- Education -->
  <rect x="60" y="470" width="330" height="245" class="entity"/>
  <rect x="60" y="470" width="330" height="40" class="head blue"/>
  <text x="225" y="496" text-anchor="middle" class="name">Образование</text>
  <text x="82" y="537" class="key">ID образования</text>
  <text x="82" y="564" class="attr">Уровень образования</text>
  <text x="82" y="591" class="attr">Вид образования</text>
  <text x="82" y="618" class="attr">Учебное заведение</text>
  <text x="82" y="645" class="attr">Документ</text>
  <text x="82" y="672" class="attr">ID кандидата</text>

  <!-- Application -->
  <rect x="500" y="455" width="360" height="300" class="entity"/>
  <rect x="500" y="455" width="360" height="40" class="head yellow"/>
  <text x="680" y="481" text-anchor="middle" class="name">Анкета кандидата</text>
  <text x="522" y="522" class="key">ID анкеты</text>
  <text x="522" y="549" class="attr">ID кандидата</text>
  <text x="522" y="576" class="attr">ID источника сведений</text>
  <text x="522" y="603" class="attr">ID связи должности</text>
  <text x="522" y="630" class="attr">Дата создания</text>
  <text x="522" y="657" class="attr">Дата отправки</text>
  <text x="522" y="684" class="attr">Статус анкеты</text>
  <text x="522" y="711" class="attr">Комментарий кадровика</text>
  <text x="522" y="738" class="attr">Иные сведения</text>

  <!-- Source -->
  <rect x="940" y="115" width="300" height="195" class="entity"/>
  <rect x="940" y="115" width="300" height="40" class="head green"/>
  <text x="1090" y="141" text-anchor="middle" class="name">Источник сведений</text>
  <text x="962" y="182" class="key">ID источника</text>
  <text x="962" y="209" class="attr">Наименование</text>
  <text x="962" y="236" class="attr">Активность</text>
  <text x="962" y="263" class="attr">Порядок отображения</text>

  <!-- Category -->
  <rect x="940" y="375" width="300" height="195" class="entity"/>
  <rect x="940" y="375" width="300" height="40" class="head green"/>
  <text x="1090" y="401" text-anchor="middle" class="name">Категория службы</text>
  <text x="962" y="442" class="key">ID категории</text>
  <text x="962" y="469" class="attr">Наименование</text>
  <text x="962" y="496" class="attr">Активность</text>
  <text x="962" y="523" class="attr">Порядок отображения</text>

  <!-- Service -->
  <rect x="940" y="635" width="300" height="195" class="entity"/>
  <rect x="940" y="635" width="300" height="40" class="head green"/>
  <text x="1090" y="661" text-anchor="middle" class="name">Служба</text>
  <text x="962" y="702" class="key">ID службы</text>
  <text x="962" y="729" class="attr">Наименование</text>
  <text x="962" y="756" class="attr">Активность</text>
  <text x="962" y="783" class="attr">Порядок отображения</text>

  <!-- Department -->
  <rect x="1320" y="115" width="330" height="220" class="entity"/>
  <rect x="1320" y="115" width="330" height="40" class="head green"/>
  <text x="1485" y="141" text-anchor="middle" class="name">Подразделение</text>
  <text x="1342" y="182" class="key">ID подразделения</text>
  <text x="1342" y="209" class="attr">Наименование</text>
  <text x="1342" y="236" class="attr">Тип подразделения</text>
  <text x="1342" y="263" class="attr">Родительское подразделение</text>
  <text x="1342" y="290" class="attr">Активность</text>

  <!-- Position -->
  <rect x="1320" y="405" width="330" height="220" class="entity"/>
  <rect x="1320" y="405" width="330" height="40" class="head green"/>
  <text x="1485" y="431" text-anchor="middle" class="name">Должность</text>
  <text x="1342" y="472" class="key">ID должности</text>
  <text x="1342" y="499" class="attr">Наименование</text>
  <text x="1342" y="526" class="attr">Начальствующий состав</text>
  <text x="1342" y="553" class="attr">Активность</text>
  <text x="1342" y="580" class="attr">Порядок отображения</text>

