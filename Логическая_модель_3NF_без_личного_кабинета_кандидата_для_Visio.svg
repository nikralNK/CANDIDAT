  <text x="492" y="1118" class="key">ID типа проверки</text>
  <text x="492" y="1143" class="attr">Наименование</text>

  <rect x="930" y="1060" width="300" height="205" class="entity"/>
  <rect x="930" y="1060" width="300" height="38" class="head red"/>
