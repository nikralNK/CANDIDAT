<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .boundary { fill: #f9fafb; stroke: #374151; stroke-width: 2.4; rx: 18; }
      .actor { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .actorText { font: 16px Arial, sans-serif; fill: #2f6b1f; }
      .ucCandidate { fill: #dbeafe; stroke: #2b6cb0; stroke-width: 2.2; }
      .ucHr { fill: #dcfce7; stroke: #15803d; stroke-width: 2.2; }
      .ucSystem { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.2; }
      .label { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .assoc { stroke: #4b5563; stroke-width: 1.8; fill: none; }
      .include { stroke: #2563eb; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#blueArrow); }
      .extend { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#redArrow); }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="page" width="1600" height="1000"/>
  <text x="800" y="42" text-anchor="middle" class="title">Наглядный пример Use Case со связями include / extend</text>
  <text x="800" y="68" text-anchor="middle" class="subtitle">Для системы учета кандидатов и автоматического формирования Excel-отчета</text>

  <rect x="190" y="105" width="1220" height="780" class="boundary"/>
  <text x="800" y="135" text-anchor="middle" class="label">Система учета кандидатов</text>

  <!-- Candidate actor -->
  <circle cx="80" cy="250" r="24" class="actor"/>
  <line x1="80" y1="274" x2="80" y2="345" class="actor"/>
  <line x1="35" y1="300" x2="125" y2="300" class="actor"/>
  <line x1="80" y1="345" x2="42" y2="410" class="actor"/>
  <line x1="80" y1="345" x2="118" y2="410" class="actor"/>
  <text x="80" y="445" text-anchor="middle" class="actorText">Кандидат</text>

  <!-- HR actor -->
  <circle cx="1510" cy="300" r="24" class="actor"/>
  <line x1="1510" y1="324" x2="1510" y2="395" class="actor"/>
  <line x1="1465" y1="350" x2="1555" y2="350" class="actor"/>
  <line x1="1510" y1="395" x2="1472" y2="460" class="actor"/>
  <line x1="1510" y1="395" x2="1548" y2="460" class="actor"/>
  <text x="1510" y="495" text-anchor="middle" class="actorText">Кадровик</text>

  <!-- Candidate use cases -->
  <ellipse cx="410" cy="220" rx="160" ry="42" class="ucCandidate"/>
  <text x="410" y="215" text-anchor="middle" class="label">Выбрать категорию</text>
  <text x="410" y="235" text-anchor="middle" class="label">службы</text>

  <ellipse cx="410" cy="345" rx="160" ry="42" class="ucCandidate"/>
  <text x="410" y="340" text-anchor="middle" class="label">Выбрать подразделение</text>
  <text x="410" y="360" text-anchor="middle" class="label">и должность из списка</text>

  <ellipse cx="410" cy="480" rx="160" ry="42" class="ucCandidate"/>
  <text x="410" y="475" text-anchor="middle" class="label">Отправить анкету</text>
  <text x="410" y="495" text-anchor="middle" class="label">кадровику</text>

  <!-- System included use cases -->
  <ellipse cx="740" cy="345" rx="165" ry="42" class="ucSystem"/>
  <text x="740" y="340" text-anchor="middle" class="label">Фильтровать должности</text>
  <text x="740" y="360" text-anchor="middle" class="label">по категории</text>

  <ellipse cx="740" cy="480" rx="165" ry="42" class="ucSystem"/>
  <text x="740" y="475" text-anchor="middle" class="label">Проверить</text>
  <text x="740" y="495" text-anchor="middle" class="label">обязательные поля</text>

  <!-- HR use cases -->
  <ellipse cx="1070" cy="220" rx="165" ry="42" class="ucHr"/>
  <text x="1070" y="215" text-anchor="middle" class="label">Проверить полноту</text>
  <text x="1070" y="235" text-anchor="middle" class="label">анкеты</text>

  <ellipse cx="1070" cy="345" rx="165" ry="42" class="ucHr"/>
  <text x="1070" y="340" text-anchor="middle" class="label">Принять анкету</text>
  <text x="1070" y="360" text-anchor="middle" class="label">в работу</text>

  <ellipse cx="1070" cy="480" rx="165" ry="42" class="ucHr"/>
  <text x="1070" y="475" text-anchor="middle" class="label">Принять решение</text>
  <text x="1070" y="495" text-anchor="middle" class="label">по кандидату</text>

  <ellipse cx="1070" cy="620" rx="165" ry="42" class="ucSystem"/>
  <text x="1070" y="615" text-anchor="middle" class="label">Запустить автоформирование</text>
  <text x="1070" y="635" text-anchor="middle" class="label">Excel-отчета</text>

  <!-- HR included/extended use cases -->
  <ellipse cx="1330" cy="220" rx="150" ry="42" class="ucHr"/>
  <text x="1330" y="215" text-anchor="middle" class="label">Вернуть анкету</text>
  <text x="1330" y="235" text-anchor="middle" class="label">на доработку</text>

  <ellipse cx="1415" cy="345" rx="145" ry="42" class="ucSystem"/>
  <text x="1415" y="340" text-anchor="middle" class="label">Создать карточку</text>
  <text x="1415" y="360" text-anchor="middle" class="label">оформления</text>

  <ellipse cx="1330" cy="480" rx="150" ry="42" class="ucHr"/>
  <text x="1330" y="475" text-anchor="middle" class="label">Указать причину</text>
  <text x="1330" y="495" text-anchor="middle" class="label">отказа</text>

  <ellipse cx="1330" cy="620" rx="150" ry="42" class="ucHr"/>
  <text x="1330" y="615" text-anchor="middle" class="label">Указать реквизиты</text>
  <text x="1330" y="635" text-anchor="middle" class="label">приказа</text>

  <ellipse cx="740" cy="620" rx="165" ry="42" class="ucSystem"/>
  <text x="740" y="615" text-anchor="middle" class="label">Заполнить</text>
  <text x="740" y="635" text-anchor="middle" class="label">Excel-шаблон</text>

  <!-- Associations -->
  <line x1="125" y1="285" x2="250" y2="220" class="assoc"/>
  <line x1="125" y1="325" x2="250" y2="345" class="assoc"/>
  <line x1="125" y1="370" x2="250" y2="480" class="assoc"/>

  <line x1="1465" y1="315" x2="1235" y2="220" class="assoc"/>
  <line x1="1465" y1="350" x2="1235" y2="345" class="assoc"/>
  <line x1="1465" y1="390" x2="1235" y2="480" class="assoc"/>
  <line x1="1465" y1="430" x2="1235" y2="620" class="assoc"/>

  <!-- Include links -->
  <line x1="570" y1="345" x2="575" y2="345" class="include"/>
  <text x="585" y="330" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="570" y1="480" x2="575" y2="480" class="include"/>
  <text x="585" y="465" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="1235" y1="345" x2="1270" y2="345" class="include"/>
  <text x="1238" y="330" class="small">&lt;&lt;include&gt;&gt;</text>
  <path d="M 905 620 C 940 590, 980 590, 1010 620" class="include"/>
  <text x="930" y="585" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Extend links: extension use case points to base use case -->
  <line x1="1180" y1="220" x2="1235" y2="220" class="extend"/>
  <text x="1190" y="205" class="small">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1180" y1="480" x2="1235" y2="480" class="extend"/>
  <text x="1190" y="465" class="small">&lt;&lt;extend&gt;&gt;</text>

  <path d="M 1215 610 C 1185 570, 1170 530, 1185 502" class="extend"/>
  <text x="1195" y="560" class="small">&lt;&lt;extend&gt;&gt;</text>

  <!-- Notes -->
  <rect x="260" y="760" width="520" height="95" class="note"/>
  <text x="520" y="790" text-anchor="middle" class="noteText">include: обязательный шаг.</text>
  <text x="520" y="815" text-anchor="middle" class="noteText">Например, перед отправкой анкеты система всегда проверяет поля.</text>
  <text x="520" y="840" text-anchor="middle" class="noteText">После выбора категории система всегда фильтрует должности.</text>

  <rect x="850" y="760" width="520" height="95" class="note"/>
  <text x="1110" y="790" text-anchor="middle" class="noteText">extend: действие только при условии.</text>
  <text x="1110" y="815" text-anchor="middle" class="noteText">Причина отказа нужна только при отказе.</text>
  <text x="1110" y="840" text-anchor="middle" class="noteText">Реквизиты приказа нужны только при приеме на службу.</text>
</svg>
