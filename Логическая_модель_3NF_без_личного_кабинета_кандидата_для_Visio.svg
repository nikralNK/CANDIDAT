  <line x1="470" y1="525" x2="360" y2="525" class="line"/><text x="440" y="510" class="rel">1</text><text x="385" y="510" class="rel">0..N</text>
  <line x1="355" y1="235" x2="470" y2="570" class="line"/><text x="370" y="260" class="rel">1</text><text x="445" y="555" class="rel">0..N</text>
  <line x1="830" y1="530" x2="930" y2="195" class="line"/><text x="850" y="510" class="rel">N</text><text x="910" y="210" class="rel">1</text>
  <line x1="830" y1="560" x2="1300" y2="730" class="line"/><text x="850" y="585" class="rel">N</text><text x="1275" y="718" class="rel">1</text>

  <line x1="1215" y1="410" x2="1300" y2="705" class="line"/><text x="1230" y="430" class="rel">1</text><text x="1275" y="690" class="rel">0..N</text>
  <line x1="1215" y1="625" x2="1300" y2="760" class="line"/><text x="1230" y="650" class="rel">1</text><text x="1275" y="745" class="rel">0..N</text>
  <line x1="1452" y1="295" x2="1462" y2="625" class="line"/><text x="1470" y="320" class="rel">1</text><text x="1470" y="610" class="rel">0..N</text>
  <line x1="1452" y1="540" x2="1462" y2="625" class="line"/><text x="1470" y="560" class="rel">1</text><text x="1470" y="610" class="rel">0..N</text>

  <line x1="470" y1="850" x2="360" y2="850" class="line"/><text x="440" y="835" class="rel">1</text><text x="385" y="835" class="rel">0..1</text>
  <line x1="830" y1="600" x2="930" y2="875" class="line"/><text x="850" y="625" class="rel">1</text><text x="905" y="860" class="rel">0..N</text>
  <line x1="770" y1="870" x2="930" y2="900" class="line"/><text x="790" y="855" class="rel">1</text><text x="905" y="885" class="rel">0..N</text>
