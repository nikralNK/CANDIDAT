<svg xmlns="http://www.w3.org/2000/svg" width="1750" height="1150" viewBox="0 0 1750 1150">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .boundary { fill: #f9fafb; stroke: #374151; stroke-width: 2.5; rx: 18; }
      .actor { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .actorText { font: 16px Arial, sans-serif; fill: #2f6b1f; }
      .candidate { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.2; }
      .hr { fill: #dcfce7; stroke: #15803d; stroke-width: 2.2; }
      .admin { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2.2; }
      .system { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.2; }
      .label { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .section { font: 700 17px Arial, sans-serif; fill: #111827; }
      .assoc { stroke: #4b5563; stroke-width: 1.8; fill: none; }
      .include { stroke: #2563eb; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#blueArrow); }
      .extend { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#redArrow); }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="page" width="1750" height="1150"/>
  <text x="875" y="42" text-anchor="middle" class="title">Use Case: учет кандидатов без личного кабинета кандидата</text>
  <text x="875" y="70" text-anchor="middle" class="subtitle">Кандидат предоставляет данные, кадровик вносит их в систему, отчет Excel формируется автоматически</text>

  <rect x="220" y="105" width="1290" height="940" class="boundary"/>
  <text x="865" y="135" text-anchor="middle" class="section">Система учета кандидатов для приема на службу</text>

  <!-- Candidate actor -->
  <circle cx="85" cy="235" r="25" class="actor"/>
  <line x1="85" y1="260" x2="85" y2="340" class="actor"/>
  <line x1="35" y1="290" x2="135" y2="290" class="actor"/>
  <line x1="85" y1="340" x2="42" y2="410" class="actor"/>
  <line x1="85" y1="340" x2="128" y2="410" class="actor"/>
  <text x="85" y="445" text-anchor="middle" class="actorText">Кандидат</text>

  <!-- HR actor -->
  <circle cx="1645" cy="360" r="25" class="actor"/>
  <line x1="1645" y1="385" x2="1645" y2="465" class="actor"/>
  <line x1="1595" y1="415" x2="1695" y2="415" class="actor"/>
  <line x1="1645" y1="465" x2="1602" y2="535" class="actor"/>
  <line x1="1645" y1="465" x2="1688" y2="535" class="actor"/>
  <text x="1645" y="570" text-anchor="middle" class="actorText">Кадровик</text>

  <!-- Admin actor -->
  <circle cx="1645" cy="820" r="25" class="actor"/>
  <line x1="1645" y1="845" x2="1645" y2="925" class="actor"/>
  <line x1="1595" y1="875" x2="1695" y2="875" class="actor"/>
  <line x1="1645" y1="925" x2="1602" y2="995" class="actor"/>
  <line x1="1645" y1="925" x2="1688" y2="995" class="actor"/>
  <text x="1645" y="1030" text-anchor="middle" class="actorText">Администратор</text>

  <!-- External candidate use case -->
  <text x="405" y="185" text-anchor="middle" class="section">Внешнее действие кандидата</text>
  <ellipse cx="405" cy="250" rx="175" ry="42" class="candidate"/>
  <text x="405" y="245" text-anchor="middle" class="label">Предоставить сведения</text>
  <text x="405" y="265" text-anchor="middle" class="label">и документы</text>

  <!-- HR use cases -->
  <text x="790" y="185" text-anchor="middle" class="section">Рабочее место кадровика</text>

  <ellipse cx="790" cy="250" rx="170" ry="38" class="hr"/>
  <text x="790" y="245" text-anchor="middle" class="label">Создать запись</text>
  <text x="790" y="265" text-anchor="middle" class="label">кандидата</text>

  <ellipse cx="790" cy="345" rx="170" ry="38" class="hr"/>
  <text x="790" y="340" text-anchor="middle" class="label">Внести личные данные</text>
  <text x="790" y="360" text-anchor="middle" class="label">и образование</text>

  <ellipse cx="790" cy="440" rx="170" ry="38" class="hr"/>
  <text x="790" y="435" text-anchor="middle" class="label">Указать источник</text>
  <text x="790" y="455" text-anchor="middle" class="label">сведений</text>

  <ellipse cx="790" cy="535" rx="170" ry="38" class="hr"/>
  <text x="790" y="530" text-anchor="middle" class="label">Выбрать категорию,</text>
  <text x="790" y="550" text-anchor="middle" class="label">подразделение и должность</text>

  <ellipse cx="790" cy="630" rx="170" ry="38" class="system"/>
  <text x="790" y="625" text-anchor="middle" class="label">Создать карточку</text>
  <text x="790" y="645" text-anchor="middle" class="label">оформления</text>

  <ellipse cx="790" cy="725" rx="170" ry="38" class="hr"/>
  <text x="790" y="720" text-anchor="middle" class="label">Внести этапы</text>
  <text x="790" y="740" text-anchor="middle" class="label">изучения</text>

  <ellipse cx="790" cy="820" rx="170" ry="38" class="hr"/>
  <text x="790" y="815" text-anchor="middle" class="label">Внести служебные</text>
  <text x="790" y="835" text-anchor="middle" class="label">проверки</text>

  <ellipse cx="1125" cy="345" rx="170" ry="38" class="hr"/>
  <text x="1125" y="340" text-anchor="middle" class="label">Проверить</text>
  <text x="1125" y="360" text-anchor="middle" class="label">обязательные поля</text>

  <ellipse cx="1125" cy="535" rx="170" ry="38" class="system"/>
  <text x="1125" y="530" text-anchor="middle" class="label">Фильтровать должности</text>
  <text x="1125" y="550" text-anchor="middle" class="label">по категории</text>

  <ellipse cx="1125" cy="725" rx="170" ry="38" class="hr"/>
  <text x="1125" y="720" text-anchor="middle" class="label">Принять решение</text>
  <text x="1125" y="740" text-anchor="middle" class="label">по кандидату</text>

  <ellipse cx="1125" cy="820" rx="170" ry="38" class="system"/>
  <text x="1125" y="815" text-anchor="middle" class="label">Запустить автоформирование</text>
  <text x="1125" y="835" text-anchor="middle" class="label">Excel-отчета</text>

  <ellipse cx="1390" cy="670" rx="140" ry="38" class="hr"/>
  <text x="1390" y="665" text-anchor="middle" class="label">Указать причину</text>
  <text x="1390" y="685" text-anchor="middle" class="label">отказа</text>

  <ellipse cx="1390" cy="760" rx="140" ry="38" class="hr"/>
  <text x="1390" y="755" text-anchor="middle" class="label">Указать реквизиты</text>
  <text x="1390" y="775" text-anchor="middle" class="label">приказа</text>

  <ellipse cx="1390" cy="850" rx="140" ry="38" class="system"/>
  <text x="1390" y="845" text-anchor="middle" class="label">Заполнить</text>
  <text x="1390" y="865" text-anchor="middle" class="label">Excel-шаблон</text>

  <!-- Admin use cases -->
  <text x="405" y="835" text-anchor="middle" class="section">Администрирование</text>

  <ellipse cx="405" cy="890" rx="165" ry="38" class="admin"/>
  <text x="405" y="885" text-anchor="middle" class="label">Создать / изменить</text>
  <text x="405" y="905" text-anchor="middle" class="label">пользователя</text>

  <ellipse cx="405" cy="985" rx="165" ry="38" class="admin"/>
  <text x="405" y="980" text-anchor="middle" class="label">Добавить / редактировать</text>
  <text x="405" y="1000" text-anchor="middle" class="label">значение справочника</text>

  <ellipse cx="790" cy="985" rx="170" ry="38" class="admin"/>
  <text x="790" y="980" text-anchor="middle" class="label">Настроить связи</text>
  <text x="790" y="1000" text-anchor="middle" class="label">справочников</text>

  <ellipse cx="1125" cy="985" rx="170" ry="38" class="admin"/>
  <text x="1125" y="980" text-anchor="middle" class="label">Настроить шаблон</text>
  <text x="1125" y="1000" text-anchor="middle" class="label">Excel-отчета</text>

  <!-- Associations -->
  <line x1="135" y1="300" x2="230" y2="250" class="assoc"/>
  <line x1="580" y1="250" x2="620" y2="250" class="assoc"/>

  <line x1="1595" y1="370" x2="960" y2="250" class="assoc"/>
  <line x1="1595" y1="390" x2="960" y2="345" class="assoc"/>
  <line x1="1595" y1="415" x2="960" y2="440" class="assoc"/>
  <line x1="1595" y1="440" x2="960" y2="535" class="assoc"/>
  <line x1="1595" y1="465" x2="960" y2="725" class="assoc"/>
  <line x1="1595" y1="490" x2="960" y2="820" class="assoc"/>
  <line x1="1595" y1="515" x2="1295" y2="725" class="assoc"/>
  <line x1="1595" y1="540" x2="1295" y2="820" class="assoc"/>

  <line x1="1595" y1="820" x2="570" y2="890" class="assoc"/>
  <line x1="1595" y1="845" x2="570" y2="985" class="assoc"/>
  <line x1="1595" y1="875" x2="960" y2="985" class="assoc"/>
  <line x1="1595" y1="900" x2="1295" y2="985" class="assoc"/>

  <!-- Include -->
  <line x1="960" y1="345" x2="955" y2="345" class="include"/>
  <text x="970" y="330" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="960" y1="535" x2="955" y2="535" class="include"/>
  <text x="970" y="520" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="790" y1="573" x2="790" y2="592" class="include"/>
  <text x="812" y="592" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="1295" y1="820" x2="1250" y2="840" class="include"/>
  <text x="1260" y="812" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Extend -->
  <line x1="1250" y1="680" x2="1260" y2="705" class="extend"/>
  <text x="1260" y="680" class="small">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1250" y1="760" x2="1260" y2="740" class="extend"/>
  <text x="1260" y="760" class="small">&lt;&lt;extend&gt;&gt;</text>

  <!-- Notes -->
  <rect x="240" y="1060" width="630" height="75" class="note"/>
  <text x="555" y="1088" text-anchor="middle" class="noteText">Кандидат не входит в систему. Он только предоставляет сведения и документы.</text>
  <text x="555" y="1114" text-anchor="middle" class="noteText">Все данные в систему вносит кадровик.</text>

  <rect x="930" y="1060" width="560" height="75" class="note"/>
  <text x="1210" y="1088" text-anchor="middle" class="noteText">Excel не заполняется вручную.</text>
  <text x="1210" y="1114" text-anchor="middle" class="noteText">Кадровик запускает формирование, система сама заполняет шаблон.</text>
</svg>
