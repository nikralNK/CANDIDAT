  <text x="952" y="1123" class="key">ID проверки</text>
  <text x="952" y="1148" class="attr">ID карточки</text>
  <text x="952" y="1173" class="attr">ID типа проверки</text>
  <text x="952" y="1198" class="attr">Дата направления</text>
  <text x="952" y="1223" class="attr">Дата результата</text>
