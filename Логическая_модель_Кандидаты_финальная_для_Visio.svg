  <rect x="60" y="900" width="330" height="220" class="entity"/>
  <rect x="60" y="900" width="330" height="40" class="head yellow"/>
  <text x="225" y="926" text-anchor="middle" class="name">Итоговое решение</text>
  <text x="82" y="967" class="key">ID решения</text>
  <text x="82" y="994" class="attr">ID карточки</text>
  <text x="82" y="1021" class="attr">Тип решения</text>
  <text x="82" y="1048" class="attr">Дата решения</text>
  <text x="82" y="1075" class="attr">Причина отказа</text>
  <text x="82" y="1102" class="attr">Реквизиты приказа</text>

  <!-- Report template -->
  <rect x="60" y="1210" width="390" height="120" class="entity"/>
  <rect x="60" y="1210" width="390" height="40" class="head purple"/>
  <text x="255" y="1236" text-anchor="middle" class="name">Шаблон отчета</text>
  <text x="82" y="1277" class="key">ID шаблона</text>
  <text x="200" y="1277" class="attr">Название, правила отбора, колонки Excel</text>

  <!-- Report export -->
  <rect x="540" y="1210" width="450" height="120" class="entity"/>
  <rect x="540" y="1210" width="450" height="40" class="head purple"/>
  <text x="765" y="1236" text-anchor="middle" class="name">Выгрузка отчета</text>
  <text x="562" y="1277" class="key">ID выгрузки</text>
  <text x="682" y="1277" class="attr">ID шаблона, ID пользователя, период, файл</text>

  <!-- Relations -->
  <line x1="370" y1="230" x2="500" y2="230" class="line"/>
  <text x="405" y="215" class="rel">1</text><text x="468" y="215" class="rel">0..1</text>

  <line x1="665" y1="340" x2="680" y2="455" class="line"/>
  <text x="685" y="380" class="rel">1</text><text x="690" y="435" class="rel">0..N</text>

  <line x1="500" y1="610" x2="390" y2="610" class="line"/>
  <text x="470" y="595" class="rel">1</text><text x="410" y="595" class="rel">0..N</text>

  <line x1="860" y1="580" x2="940" y2="215" class="line"/>
  <text x="875" y="560" class="rel">N</text><text x="918" y="230" class="rel">1</text>

  <line x1="860" y1="610" x2="1320" y2="820" class="line"/>
  <text x="875" y="635" class="rel">N</text><text x="1290" y="805" class="rel">1</text>

  <line x1="1240" y1="470" x2="1320" y2="790" class="line"/>
  <text x="1255" y="492" class="rel">1</text><text x="1300" y="770" class="rel">0..N</text>

  <line x1="1240" y1="735" x2="1320" y2="820" class="line"/>
  <text x="1250" y="755" class="rel">1</text><text x="1300" y="805" class="rel">0..N</text>

  <line x1="1485" y1="335" x2="1495" y2="700" class="line"/>
  <text x="1505" y="365" class="rel">1</text><text x="1505" y="685" class="rel">0..N</text>

  <line x1="1485" y1="625" x2="1495" y2="700" class="line"/>
  <text x="1505" y="645" class="rel">1</text><text x="1505" y="685" class="rel">0..N</text>

  <line x1="680" y1="755" x2="680" y2="900" class="line"/>
  <text x="695" y="800" class="rel">1</text><text x="695" y="880" class="rel">0..1</text>

  <line x1="860" y1="1030" x2="940" y2="1035" class="line"/>
  <text x="880" y="1018" class="rel">1</text><text x="910" y="1018" class="rel">0..N</text>

  <line x1="860" y1="1080" x2="1320" y2="1120" class="line"/>
  <text x="880" y="1070" class="rel">1</text><text x="1290" y="1105" class="rel">0..N</text>

  <line x1="500" y1="1030" x2="390" y2="1030" class="line"/>
  <text x="470" y="1015" class="rel">1</text><text x="410" y="1015" class="rel">0..1</text>

  <line x1="450" y1="1265" x2="540" y2="1265" class="line"/>
  <text x="470" y="1250" class="rel">1</text><text x="510" y="1250" class="rel">0..N</text>

  <line x1="215" y1="340" x2="765" y2="1210" class="line"/>
  <text x="245" y="365" class="rel">1</text><text x="735" y="1195" class="rel">0..N</text>

  <!-- Note -->
  <rect x="1260" y="1245" width="560" height="78" class="note"/>
  <text x="1540" y="1274" text-anchor="middle" class="noteText">Связь должности обеспечивает фильтрацию выпадающих списков.</text>
  <text x="1540" y="1298" text-anchor="middle" class="noteText">В анкете хранится ссылка на готовую связку: категория + служба + подразделение + должность.</text>
</svg>
