<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1350" viewBox="0 0 1900 1350">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .table { fill: #ffffff; stroke: #374151; stroke-width: 2; rx: 8; }
      .head { fill: #e0f2fe; stroke: #374151; stroke-width: 2; }
      .head2 { fill: #dcfce7; stroke: #374151; stroke-width: 2; }
      .head3 { fill: #fef3c7; stroke: #374151; stroke-width: 2; }
      .head4 { fill: #ede9fe; stroke: #374151; stroke-width: 2; }
      .head5 { fill: #fee2e2; stroke: #374151; stroke-width: 2; }
      .tableName { font: 700 17px Arial, sans-serif; fill: #111827; }
      .field { font: 14px Consolas, monospace; fill: #111827; }
      .pk { font: 700 14px Consolas, monospace; fill: #991b1b; }
      .fk { font: 700 14px Consolas, monospace; fill: #1d4ed8; }
      .line { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rel { font: 13px Arial, sans-serif; fill: #374151; }
      .note { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
      .noteText { font: 14px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect class="page" width="1900" height="1350"/>
  <text x="950" y="42" text-anchor="middle" class="title">Физическая модель базы данных</text>
  <text x="950" y="70" text-anchor="middle" class="subtitle">Веб-приложение учета кандидатов и формирования Excel-отчета по кандидатам</text>

  <!-- users -->
  <rect x="70" y="125" width="360" height="255" class="table"/>
  <rect x="70" y="125" width="360" height="42" class="head4"/>
  <text x="250" y="152" text-anchor="middle" class="tableName">users</text>
  <text x="90" y="195" class="pk">PK id BIGSERIAL</text>
  <text x="90" y="220" class="field">role VARCHAR(30) NOT NULL</text>
  <text x="90" y="245" class="field">login VARCHAR(100) UNIQUE</text>
  <text x="90" y="270" class="field">password_hash VARCHAR(255)</text>
  <text x="90" y="295" class="field">full_name VARCHAR(255)</text>
  <text x="90" y="320" class="field">is_active BOOLEAN</text>
  <text x="90" y="345" class="field">created_at TIMESTAMP</text>

  <!-- candidates -->
  <rect x="560" y="115" width="395" height="305" class="table"/>
  <rect x="560" y="115" width="395" height="42" class="head"/>
  <text x="757" y="142" text-anchor="middle" class="tableName">candidates</text>
  <text x="580" y="185" class="pk">PK id BIGSERIAL</text>
  <text x="580" y="210" class="fk">FK user_id BIGINT -> users.id</text>
  <text x="580" y="235" class="field">full_name VARCHAR(255) NOT NULL</text>
  <text x="580" y="260" class="field">birth_date DATE NOT NULL</text>
  <text x="580" y="285" class="field">phone VARCHAR(30)</text>
  <text x="580" y="310" class="field">email VARCHAR(150)</text>
  <text x="580" y="335" class="field">address TEXT</text>
  <text x="580" y="360" class="field">created_at TIMESTAMP</text>
  <text x="580" y="385" class="field">updated_at TIMESTAMP</text>

  <!-- departments -->
  <rect x="1100" y="115" width="350" height="230" class="table"/>
  <rect x="1100" y="115" width="350" height="42" class="head2"/>
  <text x="1275" y="142" text-anchor="middle" class="tableName">departments</text>
  <text x="1120" y="185" class="pk">PK id BIGSERIAL</text>
  <text x="1120" y="210" class="field">name VARCHAR(255) NOT NULL</text>
  <text x="1120" y="235" class="field">department_type VARCHAR(100)</text>
  <text x="1120" y="260" class="field">parent_id BIGINT NULL</text>
  <text x="1120" y="285" class="field">is_active BOOLEAN</text>
  <text x="1120" y="310" class="field">created_at TIMESTAMP</text>

  <!-- positions -->
  <rect x="1500" y="115" width="350" height="280" class="table"/>
  <rect x="1500" y="115" width="350" height="42" class="head2"/>
  <text x="1675" y="142" text-anchor="middle" class="tableName">positions</text>
  <text x="1520" y="185" class="pk">PK id BIGSERIAL</text>
  <text x="1520" y="210" class="field">name VARCHAR(255) NOT NULL</text>
  <text x="1520" y="235" class="field">service_name VARCHAR(255)</text>
  <text x="1520" y="260" class="field">command_staff_level VARCHAR(100)</text>
  <text x="1520" y="285" class="field">category VARCHAR(100)</text>
  <text x="1520" y="310" class="field">is_active BOOLEAN</text>
  <text x="1520" y="335" class="field">created_at TIMESTAMP</text>
  <text x="1520" y="360" class="field">updated_at TIMESTAMP</text>

  <!-- applications -->
  <rect x="560" y="520" width="520" height="405" class="table"/>
  <rect x="560" y="520" width="520" height="42" class="head3"/>
  <text x="820" y="547" text-anchor="middle" class="tableName">applications</text>
  <text x="580" y="590" class="pk">PK id BIGSERIAL</text>
  <text x="580" y="615" class="fk">FK candidate_id BIGINT -> candidates.id</text>
  <text x="580" y="640" class="fk">FK department_id BIGINT -> departments.id</text>
  <text x="580" y="665" class="fk">FK position_id BIGINT -> positions.id</text>
  <text x="580" y="690" class="field">statement_date DATE NOT NULL</text>
  <text x="580" y="715" class="field">status VARCHAR(50) NOT NULL</text>
  <text x="580" y="740" class="field">employment_source TEXT</text>
  <text x="580" y="765" class="field">other_info TEXT</text>
  <text x="580" y="790" class="field">submitted_at TIMESTAMP</text>
  <text x="580" y="815" class="field">created_at TIMESTAMP</text>
  <text x="580" y="840" class="field">updated_at TIMESTAMP</text>
  <text x="580" y="865" class="field">CHECK status IN (...)</text>
  <text x="580" y="890" class="field">INDEX candidate_id, status</text>

  <!-- educations -->
  <rect x="70" y="525" width="390" height="280" class="table"/>
  <rect x="70" y="525" width="390" height="42" class="head"/>
  <text x="265" y="552" text-anchor="middle" class="tableName">educations</text>
  <text x="90" y="595" class="pk">PK id BIGSERIAL</text>
  <text x="90" y="620" class="fk">FK candidate_id BIGINT -> candidates.id</text>
  <text x="90" y="645" class="field">education_level VARCHAR(100)</text>
  <text x="90" y="670" class="field">education_type VARCHAR(150)</text>
  <text x="90" y="695" class="field">institution VARCHAR(255)</text>
  <text x="90" y="720" class="field">document_number VARCHAR(100)</text>
  <text x="90" y="745" class="field">graduation_year INTEGER</text>
  <text x="90" y="770" class="field">created_at TIMESTAMP</text>

  <!-- recruitment_stages -->
  <rect x="1160" y="505" width="330" height="330" class="table"/>
  <rect x="1160" y="505" width="330" height="42" class="head5"/>
  <text x="1325" y="532" text-anchor="middle" class="tableName">recruitment_stages</text>
  <text x="1180" y="575" class="pk">PK id BIGSERIAL</text>
  <text x="1180" y="600" class="fk">FK application_id BIGINT</text>
  <text x="1180" y="625" class="field">stage_type VARCHAR(80)</text>
  <text x="1180" y="650" class="field">sent_date DATE</text>
  <text x="1180" y="675" class="field">result_date DATE</text>
  <text x="1180" y="700" class="field">result_text TEXT</text>
  <text x="1180" y="725" class="field">comment TEXT</text>
  <text x="1180" y="750" class="field">created_at TIMESTAMP</text>
  <text x="1180" y="775" class="field">updated_at TIMESTAMP</text>
  <text x="1180" y="800" class="field">INDEX application_id</text>

  <!-- candidate_checks -->
  <rect x="1540" y="505" width="330" height="330" class="table"/>
  <rect x="1540" y="505" width="330" height="42" class="head5"/>
  <text x="1705" y="532" text-anchor="middle" class="tableName">candidate_checks</text>
  <text x="1560" y="575" class="pk">PK id BIGSERIAL</text>
  <text x="1560" y="600" class="fk">FK application_id BIGINT</text>
  <text x="1560" y="625" class="field">check_type VARCHAR(80)</text>
  <text x="1560" y="650" class="field">sent_date DATE</text>
  <text x="1560" y="675" class="field">result_date DATE</text>
  <text x="1560" y="700" class="field">result_text TEXT</text>
  <text x="1560" y="725" class="field">comment TEXT</text>
  <text x="1560" y="750" class="field">created_at TIMESTAMP</text>
  <text x="1560" y="775" class="field">updated_at TIMESTAMP</text>
  <text x="1560" y="800" class="field">INDEX application_id</text>

  <!-- decisions -->
  <rect x="565" y="1010" width="430" height="255" class="table"/>
  <rect x="565" y="1010" width="430" height="42" class="head3"/>
  <text x="780" y="1037" text-anchor="middle" class="tableName">decisions</text>
  <text x="585" y="1080" class="pk">PK id BIGSERIAL</text>
  <text x="585" y="1105" class="fk">FK application_id BIGINT UNIQUE</text>
  <text x="585" y="1130" class="field">decision_type VARCHAR(30)</text>
  <text x="585" y="1155" class="field">decision_date DATE</text>
  <text x="585" y="1180" class="field">refusal_reason TEXT</text>
  <text x="585" y="1205" class="field">order_details TEXT</text>
  <text x="585" y="1230" class="field">created_at TIMESTAMP</text>

  <!-- report_exports -->
  <rect x="1125" y="1010" width="410" height="255" class="table"/>
  <rect x="1125" y="1010" width="410" height="42" class="head4"/>
  <text x="1330" y="1037" text-anchor="middle" class="tableName">report_exports</text>
  <text x="1145" y="1080" class="pk">PK id BIGSERIAL</text>
  <text x="1145" y="1105" class="fk">FK created_by BIGINT -> users.id</text>
  <text x="1145" y="1130" class="field">period_month INTEGER</text>
  <text x="1145" y="1155" class="field">period_year INTEGER</text>
  <text x="1145" y="1180" class="field">file_name VARCHAR(255)</text>
  <text x="1145" y="1205" class="field">file_path VARCHAR(500)</text>
  <text x="1145" y="1230" class="field">created_at TIMESTAMP</text>

  <!-- relationships -->
  <line x1="430" y1="250" x2="560" y2="250" class="line"/>
  <text x="462" y="235" class="rel">1 : 0..1</text>

  <line x1="755" y1="420" x2="755" y2="520" class="line"/>
  <text x="770" y="475" class="rel">1 : N</text>

  <line x1="560" y1="650" x2="460" y2="650" class="line"/>
  <text x="486" y="635" class="rel">1 : N</text>

  <line x1="1080" y1="640" x2="1160" y2="640" class="line"/>
  <text x="1094" y="625" class="rel">1 : N</text>

  <line x1="1080" y1="720" x2="1540" y2="680" class="line"/>
  <text x="1300" y="680" class="rel">1 : N</text>

  <line x1="820" y1="925" x2="800" y2="1010" class="line"/>
  <text x="825" y="970" class="rel">1 : 0..1</text>

  <line x1="1080" y1="645" x2="1100" y2="255" class="line"/>
  <text x="1082" y="430" class="rel">N : 1</text>

  <line x1="1080" y1="675" x2="1500" y2="255" class="line"/>
  <text x="1305" y="440" class="rel">N : 1</text>

  <line x1="430" y1="330" x2="1125" y2="1110" class="line"/>
  <text x="725" y="1085" class="rel">1 : N</text>

  <!-- notes -->
  <rect x="70" y="890" width="390" height="175" class="note"/>
  <text x="90" y="920" class="noteText">Назначение модели:</text>
  <text x="90" y="950" class="noteText">- хранить данные кандидата отдельно</text>
  <text x="90" y="975" class="noteText">  от служебных этапов;</text>
  <text x="90" y="1000" class="noteText">- не смешивать анкету кандидата</text>
  <text x="90" y="1025" class="noteText">  и проверки кадровика;</text>
  <text x="90" y="1050" class="noteText">- формировать Excel по шаблону.</text>

  <rect x="1580" y="1010" width="270" height="180" class="note"/>
  <text x="1600" y="1040" class="noteText">Основные типы проверок:</text>
  <text x="1600" y="1070" class="noteText">IC, GIAC, ORCH_SB, FSB,</text>
  <text x="1600" y="1095" class="noteText">GIBDD, BSTM, SOOP, UVM,</text>
  <text x="1600" y="1120" class="noteText">DIPLOMA, SGT_ACCESS.</text>
  <text x="1600" y="1160" class="noteText">Этапы: TASK, UP_UR, TEST,</text>
  <text x="1600" y="1185" class="noteText">VVK, PPO.</text>
</svg>
