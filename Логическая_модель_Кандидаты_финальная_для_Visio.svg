  <text x="962" y="997" class="key">ID этапа</text>
  <text x="962" y="1024" class="attr">ID карточки</text>
  <text x="962" y="1051" class="attr">Тип этапа</text>
  <text x="962" y="1078" class="attr">Дата направления</text>
  <text x="962" y="1105" class="attr">Дата результата</text>
  <text x="962" y="1132" class="attr">Результат</text>

  <!-- Checks -->
  <rect x="1320" y="1010" width="300" height="220" class="entity"/>
  <rect x="1320" y="1010" width="300" height="40" class="head red"/>
  <text x="1470" y="1036" text-anchor="middle" class="name">Служебная проверка</text>
  <text x="1342" y="1077" class="key">ID проверки</text>
  <text x="1342" y="1104" class="attr">ID карточки</text>
  <text x="1342" y="1131" class="attr">Тип проверки</text>
  <text x="1342" y="1158" class="attr">Дата направления</text>
  <text x="1342" y="1185" class="attr">Дата результата</text>
  <text x="1342" y="1212" class="attr">Результат</text>

