  <text x="1110" y="250" class="label">Выходы</text>
  <path class="line" d="M970 330 H1320"/>
  <path class="line" d="M970 375 H1320"/>
  <path class="line" d="M970 420 H1320"/>
  <path class="line" d="M970 465 H1320"/>
  <text x="1000" y="315" class="text">Карточка кандидата</text>
  <text x="1000" y="360" class="text">Этапы и проверки</text>
  <text x="1000" y="405" class="text">Итоговое решение</text>
  <text x="1000" y="450" class="text">Excel-отчет</text>

  <text x="575" y="690" class="label">Механизмы</text>
  <path class="line" d="M520 690 V490"/>
  <path class="line" d="M640 690 V490"/>
  <path class="line" d="M780 690 V490"/>
  <path class="line" d="M900 690 V490"/>
  <text x="270" y="725" class="small">Кадровик</text>
  <text x="440" y="725" class="small">WPF-приложение</text>
  <text x="660" y="725" class="small">MS SQL Server</text>
  <text x="900" y="725" class="small">Справочники системы</text>
