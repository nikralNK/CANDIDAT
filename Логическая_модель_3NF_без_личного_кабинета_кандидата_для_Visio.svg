  <line x1="770" y1="1135" x2="930" y2="1170" class="line"/><text x="790" y="1120" class="rel">1</text><text x="905" y="1155" class="rel">0..N</text>

  <line x1="1605" y1="1045" x2="1645" y2="1070" class="line"/><text x="1612" y="1038" class="rel">1</text><text x="1628" y="1060" class="rel">0..N</text>
  <line x1="1452" y1="1115" x2="1452" y2="1180" class="line"/><text x="1465" y="1135" class="rel">1</text><text x="1465" y="1168" class="rel">1..N</text>
  <line x1="207" y1="295" x2="1645" y2="1090" class="line"/><text x="230" y="315" class="rel">1</text><text x="1620" y="1080" class="rel">0..N</text>

  <!-- Note -->
  <rect x="60" y="1245" width="760" height="75" class="note"/>
  <text x="440" y="1272" text-anchor="middle" class="noteText">Кандидат не имеет логина и пароля. Его данные вносит кадровик.</text>
  <text x="440" y="1298" text-anchor="middle" class="noteText">Карточка хранит ID вакансии, поэтому категория, служба, подразделение и должность не дублируются.</text>
</svg>
