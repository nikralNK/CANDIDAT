<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f4e79"/>
    </marker>
    <style>
      .box{fill:#f8fbff;stroke:#1f4e79;stroke-width:3}
      .title{font-family:Arial, sans-serif;font-size:30px;font-weight:bold;fill:#1f2937}
      .text{font-family:Arial, sans-serif;font-size:20px;fill:#111827}
      .small{font-family:Arial, sans-serif;font-size:17px;fill:#111827}
      .label{font-family:Arial, sans-serif;font-size:18px;font-weight:bold;fill:#1f4e79}
      .line{stroke:#1f4e79;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect x="20" y="20" width="1360" height="780" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="700" y="70" text-anchor="middle" class="title">IDEF0 A-0. Учет кандидатов на службу</text>

  <rect x="430" y="300" width="540" height="190" rx="4" class="box"/>
  <text x="700" y="365" text-anchor="middle" class="title">Учет кандидатов</text>
  <text x="700" y="400" text-anchor="middle" class="title">на службу</text>
  <text x="945" y="475" text-anchor="end" class="small">A-0</text>

  <text x="60" y="250" class="label">Входы</text>
  <path class="line" d="M80 330 H430"/>
  <path class="line" d="M80 385 H430"/>
  <path class="line" d="M80 440 H430"/>
  <text x="90" y="315" class="text">Сведения кандидата</text>
  <text x="90" y="370" class="text">Документы и образование</text>
  <text x="90" y="425" class="text">Источник сведений</text>

  <text x="585" y="125" class="label">Управление</text>
  <path class="line" d="M520 145 V300"/>
  <path class="line" d="M640 145 V300"/>
  <path class="line" d="M780 145 V300"/>
  <path class="line" d="M900 145 V300"/>
  <text x="210" y="135" class="small">Требования кадрового учета МВД</text>
  <text x="470" y="135" class="small">Персональные данные</text>
  <text x="700" y="135" class="small">Регламент изучения</text>
