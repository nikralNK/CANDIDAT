<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .entity { fill: #ffffff; stroke: #374151; stroke-width: 2.2; rx: 10; }
      .head { fill: #dbeafe; stroke: #374151; stroke-width: 2.2; }
      .headGreen { fill: #dcfce7; stroke: #374151; stroke-width: 2.2; }
      .headYellow { fill: #fef3c7; stroke: #374151; stroke-width: 2.2; }
      .headPurple { fill: #ede9fe; stroke: #374151; stroke-width: 2.2; }
      .headRed { fill: #fee2e2; stroke: #374151; stroke-width: 2.2; }
      .entityName { font: 700 18px Arial, sans-serif; fill: #111827; }
      .attr { font: 15px Arial, sans-serif; fill: #111827; }
      .key { font: 700 15px Arial, sans-serif; fill: #991b1b; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .rel { font: 14px Arial, sans-serif; fill: #374151; font-weight: 700; }
      .note { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
      .noteText { font: 14px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect class="page" width="1800" height="1250"/>
  <text x="900" y="42" text-anchor="middle" class="title">Логическая модель данных</text>
  <text x="900" y="70" text-anchor="middle" class="subtitle">Система учета кандидатов для приема на службу и формирования Excel-отчета</text>

  <!-- User -->
  <rect x="60" y="125" width="330" height="220" class="entity"/>
  <rect x="60" y="125" width="330" height="42" class="headPurple"/>
  <text x="225" y="152" text-anchor="middle" class="entityName">Пользователь</text>
  <text x="85" y="195" class="key">ID пользователя</text>
  <text x="85" y="222" class="attr">Роль</text>
  <text x="85" y="249" class="attr">Логин</text>
  <text x="85" y="276" class="attr">Пароль</text>
  <text x="85" y="303" class="attr">ФИО</text>
  <text x="85" y="330" class="attr">Активность</text>

  <!-- Candidate -->
  <rect x="520" y="115" width="350" height="250" class="entity"/>
  <rect x="520" y="115" width="350" height="42" class="head"/>
  <text x="695" y="142" text-anchor="middle" class="entityName">Кандидат</text>
  <text x="545" y="185" class="key">ID кандидата</text>
  <text x="545" y="212" class="attr">ФИО</text>
  <text x="545" y="239" class="attr">Дата рождения</text>
  <text x="545" y="266" class="attr">Телефон</text>
  <text x="545" y="293" class="attr">Email</text>
  <text x="545" y="320" class="attr">Адрес</text>
  <text x="545" y="347" class="attr">Дата создания анкеты</text>

  <!-- Education -->
  <rect x="60" y="510" width="350" height="245" class="entity"/>
  <rect x="60" y="510" width="350" height="42" class="head"/>
  <text x="235" y="537" text-anchor="middle" class="entityName">Образование</text>
  <text x="85" y="580" class="key">ID образования</text>
  <text x="85" y="607" class="attr">Уровень образования</text>
  <text x="85" y="634" class="attr">Вид образования</text>
  <text x="85" y="661" class="attr">Учебное заведение</text>
  <text x="85" y="688" class="attr">Документ об образовании</text>
  <text x="85" y="715" class="attr">Год окончания</text>

  <!-- Application -->
  <rect x="520" y="485" width="390" height="325" class="entity"/>
  <rect x="520" y="485" width="390" height="42" class="headYellow"/>
  <text x="715" y="512" text-anchor="middle" class="entityName">Заявление / карточка оформления</text>
  <text x="545" y="555" class="key">ID заявления</text>
  <text x="545" y="582" class="attr">Дата заявления</text>
  <text x="545" y="609" class="attr">Статус</text>
  <text x="545" y="636" class="attr">Источник сведений</text>
  <text x="545" y="663" class="attr">Дата отправки</text>
  <text x="545" y="690" class="attr">Иные сведения</text>
  <text x="545" y="717" class="attr">Дата создания</text>
  <text x="545" y="744" class="attr">Дата изменения</text>
  <text x="545" y="771" class="attr">Отчетный период</text>

  <!-- Department -->
  <rect x="1050" y="120" width="330" height="210" class="entity"/>
  <rect x="1050" y="120" width="330" height="42" class="headGreen"/>
  <text x="1215" y="147" text-anchor="middle" class="entityName">Подразделение</text>
  <text x="1075" y="190" class="key">ID подразделения</text>
  <text x="1075" y="217" class="attr">Наименование</text>
  <text x="1075" y="244" class="attr">Тип подразделения</text>
  <text x="1075" y="271" class="attr">Вышестоящее подразделение</text>
  <text x="1075" y="298" class="attr">Активность</text>

  <!-- Position -->
  <rect x="1430" y="120" width="330" height="245" class="entity"/>
  <rect x="1430" y="120" width="330" height="42" class="headGreen"/>
  <text x="1595" y="147" text-anchor="middle" class="entityName">Должность</text>
  <text x="1455" y="190" class="key">ID должности</text>
  <text x="1455" y="217" class="attr">Наименование должности</text>
  <text x="1455" y="244" class="attr">Наименование службы</text>
  <text x="1455" y="271" class="attr">Начальствующий состав</text>
  <text x="1455" y="298" class="attr">Категория</text>
  <text x="1455" y="325" class="attr">Активность</text>

  <!-- Stage -->
  <rect x="1010" y="500" width="350" height="280" class="entity"/>
  <rect x="1010" y="500" width="350" height="42" class="headRed"/>
  <text x="1185" y="527" text-anchor="middle" class="entityName">Этап изучения</text>
  <text x="1035" y="570" class="key">ID этапа</text>
  <text x="1035" y="597" class="attr">Тип этапа</text>
  <text x="1035" y="624" class="attr">Дата направления</text>
  <text x="1035" y="651" class="attr">Дата результата</text>
  <text x="1035" y="678" class="attr">Результат</text>
  <text x="1035" y="705" class="attr">Комментарий</text>
  <text x="1035" y="732" class="attr">Дата изменения</text>

  <!-- Check -->
  <rect x="1430" y="500" width="330" height="280" class="entity"/>
  <rect x="1430" y="500" width="330" height="42" class="headRed"/>
  <text x="1595" y="527" text-anchor="middle" class="entityName">Служебная проверка</text>
  <text x="1455" y="570" class="key">ID проверки</text>
  <text x="1455" y="597" class="attr">Тип проверки</text>
  <text x="1455" y="624" class="attr">Дата направления</text>
  <text x="1455" y="651" class="attr">Дата результата</text>
  <text x="1455" y="678" class="attr">Результат</text>
  <text x="1455" y="705" class="attr">Комментарий</text>
  <text x="1455" y="732" class="attr">Дата изменения</text>

  <!-- Decision -->
  <rect x="520" y="935" width="390" height="245" class="entity"/>
  <rect x="520" y="935" width="390" height="42" class="headYellow"/>
  <text x="715" y="962" text-anchor="middle" class="entityName">Итоговое решение</text>
  <text x="545" y="1005" class="key">ID решения</text>
  <text x="545" y="1032" class="attr">Тип решения</text>
  <text x="545" y="1059" class="attr">Дата решения</text>
  <text x="545" y="1086" class="attr">Причина отказа</text>
  <text x="545" y="1113" class="attr">Реквизиты приказа</text>
  <text x="545" y="1140" class="attr">Дата создания</text>

  <!-- Report -->
  <rect x="1045" y="925" width="370" height="255" class="entity"/>
  <rect x="1045" y="925" width="370" height="42" class="headPurple"/>
  <text x="1230" y="952" text-anchor="middle" class="entityName">Выгрузка отчета</text>
  <text x="1070" y="995" class="key">ID выгрузки</text>
  <text x="1070" y="1022" class="attr">Месяц отчета</text>
  <text x="1070" y="1049" class="attr">Год отчета</text>
  <text x="1070" y="1076" class="attr">Имя файла</text>
  <text x="1070" y="1103" class="attr">Путь к файлу</text>
  <text x="1070" y="1130" class="attr">Дата формирования</text>
  <text x="1070" y="1157" class="attr">Автор выгрузки</text>

  <!-- Relationships -->
  <line x1="390" y1="235" x2="520" y2="235" class="line"/>
  <text x="428" y="222" class="rel">1</text>
  <text x="488" y="222" class="rel">0..1</text>

  <line x1="695" y1="365" x2="695" y2="485" class="line"/>
  <text x="710" y="405" class="rel">1</text>
  <text x="710" y="465" class="rel">0..N</text>

  <line x1="520" y1="640" x2="410" y2="640" class="line"/>
  <text x="485" y="625" class="rel">1</text>
  <text x="430" y="625" class="rel">0..N</text>

  <line x1="910" y1="590" x2="1010" y2="590" class="line"/>
  <text x="930" y="575" class="rel">1</text>
  <text x="978" y="575" class="rel">0..N</text>

  <line x1="910" y1="690" x2="1430" y2="650" class="line"/>
  <text x="930" y="683" class="rel">1</text>
  <text x="1392" y="638" class="rel">0..N</text>

  <line x1="715" y1="810" x2="715" y2="935" class="line"/>
  <text x="730" y="850" class="rel">1</text>
  <text x="730" y="915" class="rel">0..1</text>

  <line x1="910" y1="550" x2="1050" y2="245" class="line"/>
  <text x="922" y="525" class="rel">N</text>
  <text x="1032" y="260" class="rel">1</text>

  <line x1="910" y1="615" x2="1430" y2="245" class="line"/>
  <text x="930" y="605" class="rel">N</text>
  <text x="1408" y="260" class="rel">1</text>

  <line x1="390" y1="300" x2="1045" y2="1040" class="line"/>
  <text x="420" y="325" class="rel">1</text>
  <text x="1010" y="1025" class="rel">0..N</text>

  <!-- notes -->
  <rect x="60" y="900" width="370" height="210" class="note"/>
  <text x="85" y="930" class="noteText">Смысл логической модели:</text>
  <text x="85" y="962" class="noteText">- показывает сущности предметной области;</text>
  <text x="85" y="989" class="noteText">- описывает атрибуты без SQL-типов;</text>
  <text x="85" y="1016" class="noteText">- разделяет данные кандидата,</text>
  <text x="85" y="1043" class="noteText">  этапы, проверки и решение;</text>
  <text x="85" y="1070" class="noteText">- служит основой для физической модели.</text>

  <rect x="1450" y="940" width="310" height="170" class="note"/>
  <text x="1475" y="970" class="noteText">Ключевой результат:</text>
  <text x="1475" y="1002" class="noteText">из связанных сущностей система</text>
  <text x="1475" y="1029" class="noteText">формирует строки Excel-отчета:</text>
  <text x="1475" y="1056" class="noteText">кандидат + заявление + этапы</text>
  <text x="1475" y="1083" class="noteText">+ проверки + итоговое решение.</text>
</svg>
