  <text x="952" y="393" class="key">ID категории</text>
  <text x="952" y="418" class="attr">Наименование</text>

  <rect x="930" y="545" width="285" height="155" class="entity"/>
  <rect x="930" y="545" width="285" height="38" class="head green"/>
