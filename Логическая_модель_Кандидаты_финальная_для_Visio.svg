  <rect x="500" y="900" width="360" height="275" class="entity"/>
  <rect x="500" y="900" width="360" height="40" class="head yellow"/>
  <text x="680" y="926" text-anchor="middle" class="name">Карточка оформления</text>
  <text x="522" y="967" class="key">ID карточки</text>
  <text x="522" y="994" class="attr">ID анкеты</text>
  <text x="522" y="1021" class="attr">ID связи должности</text>
  <text x="522" y="1048" class="attr">Дата заявления</text>
  <text x="522" y="1075" class="attr">Стадия изучения</text>
  <text x="522" y="1102" class="attr">Дата принятия в работу</text>
