<svg xmlns="http://www.w3.org/2000/svg" width="1850" height="1350" viewBox="0 0 1850 1350">
  <defs>
    <style>
      .page { fill: #fff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .entity { fill: #fff; stroke: #374151; stroke-width: 2; rx: 8; }
      .head { stroke: #374151; stroke-width: 2; }
      .blue { fill: #dbeafe; }
      .green { fill: #dcfce7; }
      .yellow { fill: #fef3c7; }
      .red { fill: #fee2e2; }
      .purple { fill: #ede9fe; }
      .orange { fill: #ffedd5; }
      .name { font: 700 16px Arial, sans-serif; fill: #111827; }
      .attr { font: 13px Arial, sans-serif; fill: #111827; }
      .key { font: 700 13px Arial, sans-serif; fill: #991b1b; }
      .line { stroke: #374151; stroke-width: 2; fill: none; }
      .rel { font: 12px Arial, sans-serif; fill: #374151; font-weight: 700; }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.6; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
  </defs>

  <rect class="page" width="1850" height="1350"/>
  <text x="925" y="42" text-anchor="middle" class="title">Логическая модель 3НФ без личного кабинета кандидата</text>
  <text x="925" y="70" text-anchor="middle" class="subtitle">Кандидат приносит данные, кадровик вносит их в систему и ведет карточку оформления</text>

  <!-- Core -->
  <rect x="60" y="115" width="295" height="180" class="entity"/>
  <rect x="60" y="115" width="295" height="38" class="head purple"/>
  <text x="207" y="140" text-anchor="middle" class="name">Пользователь</text>
  <text x="82" y="178" class="key">ID пользователя</text>
  <text x="82" y="203" class="attr">ФИО пользователя</text>
  <text x="82" y="228" class="attr">Логин</text>
  <text x="82" y="253" class="attr">Пароль</text>
  <text x="82" y="278" class="attr">Роль</text>

  <rect x="470" y="115" width="315" height="180" class="entity"/>
  <rect x="470" y="115" width="315" height="38" class="head blue"/>
  <text x="627" y="140" text-anchor="middle" class="name">Кандидат</text>
  <text x="492" y="178" class="key">ID кандидата</text>
  <text x="492" y="203" class="attr">ФИО кандидата</text>
  <text x="492" y="228" class="attr">Дата рождения</text>
  <text x="492" y="253" class="attr">Телефон</text>
  <text x="492" y="278" class="attr">Email</text>

  <rect x="470" y="420" width="360" height="255" class="entity"/>
  <rect x="470" y="420" width="360" height="38" class="head yellow"/>
  <text x="650" y="445" text-anchor="middle" class="name">Карточка оформления</text>
  <text x="492" y="483" class="key">ID карточки</text>
  <text x="492" y="508" class="attr">ID кандидата</text>
  <text x="492" y="533" class="attr">ID источника сведений</text>
  <text x="492" y="558" class="attr">ID вакансии</text>
  <text x="492" y="583" class="attr">ID кадровика</text>
  <text x="492" y="608" class="attr">Дата заявления</text>
  <text x="492" y="633" class="attr">Стадия изучения</text>
  <text x="492" y="658" class="attr">Иные сведения</text>

  <rect x="60" y="420" width="300" height="205" class="entity"/>
  <rect x="60" y="420" width="300" height="38" class="head blue"/>
