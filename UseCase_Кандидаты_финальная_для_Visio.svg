<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1300" viewBox="0 0 1900 1300">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
      .boundary { fill: #f9fafb; stroke: #374151; stroke-width: 2.5; rx: 18; }
      .group { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.8; rx: 14; }
      .groupTitle { font: 700 17px Arial, sans-serif; fill: #111827; }
      .label { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #4b5563; }
      .actor { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .candidate { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.1; }
      .hr { fill: #ecfdf5; stroke: #059669; stroke-width: 2.1; }
      .admin { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.1; }
      .export { fill: #fff7ed; stroke: #f97316; stroke-width: 2.1; }
      .line { stroke: #4b5563; stroke-width: 1.7; fill: none; }
      .dashed { stroke: #6b7280; stroke-width: 1.7; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .note { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; rx: 10; }
      .noteText { font: 14px Arial, sans-serif; fill: #713f12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="page" width="1900" height="1300"/>
  <text x="950" y="42" text-anchor="middle" class="title">Use Case: система учета кандидатов</text>
  <text x="950" y="70" text-anchor="middle" class="subtitle">Кандидат выбирает данные из справочников, кадровик ведет оформление, система автоматически формирует Excel-отчет</text>

  <rect x="235" y="105" width="1490" height="1120" class="boundary"/>
  <text x="980" y="135" text-anchor="middle" class="groupTitle">Веб-приложение учета кандидатов для приема на службу</text>

  <!-- Actors -->
  <circle cx="105" cy="230" r="25" class="actor"/>
  <line x1="105" y1="255" x2="105" y2="335" class="actor"/>
  <line x1="55" y1="285" x2="155" y2="285" class="actor"/>
  <line x1="105" y1="335" x2="62" y2="405" class="actor"/>
  <line x1="105" y1="335" x2="148" y2="405" class="actor"/>
  <text x="105" y="440" text-anchor="middle" class="label">Кандидат</text>

  <circle cx="1810" cy="300" r="25" class="actor"/>
  <line x1="1810" y1="325" x2="1810" y2="405" class="actor"/>
  <line x1="1760" y1="355" x2="1860" y2="355" class="actor"/>
  <line x1="1810" y1="405" x2="1767" y2="475" class="actor"/>
  <line x1="1810" y1="405" x2="1853" y2="475" class="actor"/>
  <text x="1810" y="510" text-anchor="middle" class="label">Кадровик</text>

  <circle cx="1810" cy="880" r="25" class="actor"/>
  <line x1="1810" y1="905" x2="1810" y2="985" class="actor"/>
  <line x1="1760" y1="935" x2="1860" y2="935" class="actor"/>
  <line x1="1810" y1="985" x2="1767" y2="1055" class="actor"/>
  <line x1="1810" y1="985" x2="1853" y2="1055" class="actor"/>
  <text x="1810" y="1090" text-anchor="middle" class="label">Администратор</text>

  <!-- Candidate group -->
  <rect x="280" y="165" width="395" height="655" class="group"/>
  <text x="477" y="195" text-anchor="middle" class="groupTitle">Личный кабинет кандидата</text>

  <ellipse cx="477" cy="245" rx="145" ry="34" class="candidate"/>
  <text x="477" y="250" text-anchor="middle" class="label">Зарегистрироваться / войти</text>

  <ellipse cx="477" cy="320" rx="145" ry="34" class="candidate"/>
  <text x="477" y="315" text-anchor="middle" class="label">Заполнить личные</text>
  <text x="477" y="335" text-anchor="middle" class="label">данные</text>

  <ellipse cx="477" cy="395" rx="145" ry="34" class="candidate"/>
  <text x="477" y="390" text-anchor="middle" class="label">Указать образование</text>
  <text x="477" y="410" text-anchor="middle" class="label">и источник сведений</text>

  <ellipse cx="477" cy="470" rx="145" ry="34" class="candidate"/>
  <text x="477" y="465" text-anchor="middle" class="label">Выбрать категорию</text>
  <text x="477" y="485" text-anchor="middle" class="label">службы</text>

  <ellipse cx="477" cy="545" rx="145" ry="34" class="candidate"/>
  <text x="477" y="540" text-anchor="middle" class="label">Выбрать подразделение</text>
  <text x="477" y="560" text-anchor="middle" class="label">и должность из списка</text>

  <ellipse cx="477" cy="620" rx="145" ry="34" class="candidate"/>
  <text x="477" y="615" text-anchor="middle" class="label">Сохранить анкету</text>
  <text x="477" y="635" text-anchor="middle" class="label">как черновик</text>

  <ellipse cx="477" cy="695" rx="145" ry="34" class="candidate"/>
  <text x="477" y="690" text-anchor="middle" class="label">Отправить анкету</text>
  <text x="477" y="710" text-anchor="middle" class="label">кадровику</text>

  <ellipse cx="477" cy="770" rx="145" ry="34" class="candidate"/>
  <text x="477" y="765" text-anchor="middle" class="label">Просмотреть статус</text>
  <text x="477" y="785" text-anchor="middle" class="label">оформления</text>

  <!-- HR group -->
  <rect x="730" y="165" width="440" height="655" class="group"/>
  <text x="950" y="195" text-anchor="middle" class="groupTitle">Рабочее место кадровика</text>

  <ellipse cx="950" cy="245" rx="165" ry="34" class="hr"/>
  <text x="950" y="250" text-anchor="middle" class="label">Просмотреть новые заявления</text>

  <ellipse cx="950" cy="320" rx="165" ry="34" class="hr"/>
  <text x="950" y="315" text-anchor="middle" class="label">Проверить полноту</text>
  <text x="950" y="335" text-anchor="middle" class="label">анкеты</text>

  <ellipse cx="950" cy="395" rx="165" ry="34" class="hr"/>
  <text x="950" y="390" text-anchor="middle" class="label">Принять анкету</text>
  <text x="950" y="410" text-anchor="middle" class="label">в работу</text>

  <ellipse cx="950" cy="470" rx="165" ry="34" class="hr"/>
  <text x="950" y="465" text-anchor="middle" class="label">Вернуть анкету</text>
  <text x="950" y="485" text-anchor="middle" class="label">на доработку</text>

  <ellipse cx="950" cy="545" rx="165" ry="34" class="hr"/>
  <text x="950" y="540" text-anchor="middle" class="label">Внести этапы изучения:</text>
  <text x="950" y="560" text-anchor="middle" class="label">задание, испытания, ВВК, ППО</text>

  <ellipse cx="950" cy="620" rx="165" ry="34" class="hr"/>
  <text x="950" y="615" text-anchor="middle" class="label">Внести служебные проверки:</text>
  <text x="950" y="635" text-anchor="middle" class="label">ИЦ, ГИАЦ, ФСБ, ГИБДД и др.</text>

  <ellipse cx="950" cy="695" rx="165" ry="34" class="hr"/>
  <text x="950" y="690" text-anchor="middle" class="label">Принять решение</text>
  <text x="950" y="710" text-anchor="middle" class="label">по кандидату</text>

  <ellipse cx="950" cy="770" rx="165" ry="34" class="export"/>
  <text x="950" y="765" text-anchor="middle" class="label">Запустить автоформирование</text>
  <text x="950" y="785" text-anchor="middle" class="label">Excel-отчета</text>

  <!-- Admin group -->
  <rect x="1230" y="165" width="460" height="780" class="group"/>
  <text x="1460" y="195" text-anchor="middle" class="groupTitle">Администрирование системы</text>

  <ellipse cx="1460" cy="245" rx="165" ry="32" class="admin"/>
  <text x="1460" y="250" text-anchor="middle" class="label">Создать пользователя</text>

  <ellipse cx="1460" cy="315" rx="165" ry="32" class="admin"/>
  <text x="1460" y="310" text-anchor="middle" class="label">Изменить данные</text>
  <text x="1460" y="330" text-anchor="middle" class="label">или роль пользователя</text>

  <ellipse cx="1460" cy="385" rx="165" ry="32" class="admin"/>
  <text x="1460" y="390" text-anchor="middle" class="label">Заблокировать пользователя</text>

  <ellipse cx="1460" cy="470" rx="165" ry="32" class="admin"/>
  <text x="1460" y="465" text-anchor="middle" class="label">Добавить значение</text>
  <text x="1460" y="485" text-anchor="middle" class="label">справочника</text>

  <ellipse cx="1460" cy="540" rx="165" ry="32" class="admin"/>
  <text x="1460" y="535" text-anchor="middle" class="label">Редактировать значение</text>
  <text x="1460" y="555" text-anchor="middle" class="label">справочника</text>

  <ellipse cx="1460" cy="610" rx="165" ry="32" class="admin"/>
  <text x="1460" y="605" text-anchor="middle" class="label">Отключить устаревшее</text>
  <text x="1460" y="625" text-anchor="middle" class="label">значение</text>

  <ellipse cx="1460" cy="680" rx="165" ry="32" class="admin"/>
  <text x="1460" y="675" text-anchor="middle" class="label">Задать порядок</text>
  <text x="1460" y="695" text-anchor="middle" class="label">отображения</text>

  <ellipse cx="1460" cy="750" rx="165" ry="32" class="admin"/>
  <text x="1460" y="745" text-anchor="middle" class="label">Настроить связи</text>
  <text x="1460" y="765" text-anchor="middle" class="label">справочников</text>

  <ellipse cx="1460" cy="835" rx="165" ry="32" class="admin"/>
  <text x="1460" y="830" text-anchor="middle" class="label">Настроить шаблон</text>
  <text x="1460" y="850" text-anchor="middle" class="label">Excel-отчета</text>

  <!-- Actor lines -->
  <line x1="155" y1="260" x2="332" y2="245" class="line"/>
  <line x1="155" y1="285" x2="332" y2="320" class="line"/>
  <line x1="155" y1="315" x2="332" y2="395" class="line"/>
  <line x1="155" y1="340" x2="332" y2="470" class="line"/>
  <line x1="155" y1="365" x2="332" y2="545" class="line"/>
  <line x1="155" y1="390" x2="332" y2="620" class="line"/>
  <line x1="155" y1="415" x2="332" y2="695" class="line"/>
  <line x1="155" y1="435" x2="332" y2="770" class="line"/>

  <line x1="1760" y1="320" x2="1115" y2="245" class="line"/>
  <line x1="1760" y1="350" x2="1115" y2="320" class="line"/>
  <line x1="1760" y1="380" x2="1115" y2="395" class="line"/>
  <line x1="1760" y1="410" x2="1115" y2="470" class="line"/>
  <line x1="1760" y1="440" x2="1115" y2="545" class="line"/>
  <line x1="1760" y1="465" x2="1115" y2="620" class="line"/>
  <line x1="1760" y1="490" x2="1115" y2="695" class="line"/>
  <line x1="1760" y1="510" x2="1115" y2="770" class="line"/>

  <line x1="1760" y1="880" x2="1625" y2="245" class="line"/>
  <line x1="1760" y1="900" x2="1625" y2="315" class="line"/>
  <line x1="1760" y1="920" x2="1625" y2="385" class="line"/>
  <line x1="1760" y1="940" x2="1625" y2="470" class="line"/>
  <line x1="1760" y1="960" x2="1625" y2="540" class="line"/>
  <line x1="1760" y1="985" x2="1625" y2="610" class="line"/>
  <line x1="1760" y1="1010" x2="1625" y2="680" class="line"/>
  <line x1="1760" y1="1035" x2="1625" y2="750" class="line"/>
  <line x1="1760" y1="1060" x2="1625" y2="835" class="line"/>

  <!-- Include relationships -->
  <line x1="477" y1="504" x2="477" y2="511" class="dashed"/>
  <text x="500" y="518" class="small">&lt;&lt;include&gt;&gt; фильтрация списков</text>

  <line x1="622" y1="695" x2="785" y2="245" class="dashed"/>
  <text x="650" y="455" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="950" y1="729" x2="950" y2="736" class="dashed"/>
  <text x="975" y="742" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="1460" y1="782" x2="1460" y2="803" class="dashed"/>
  <text x="1485" y="797" class="small">&lt;&lt;include&gt;&gt;</text>

  <!-- Notes -->
  <rect x="300" y="1000" width="530" height="95" class="note"/>
  <text x="565" y="1030" text-anchor="middle" class="noteText">Кандидат выбирает значения из справочников.</text>
  <text x="565" y="1054" text-anchor="middle" class="noteText">Категория фильтрует доступные должности и службы.</text>
  <text x="565" y="1078" text-anchor="middle" class="noteText">Поэтому кадровик не приводит должность к официальному виду вручную.</text>

  <rect x="910" y="1000" width="520" height="95" class="note"/>
  <text x="1170" y="1030" text-anchor="middle" class="noteText">Excel не заполняется вручную.</text>
  <text x="1170" y="1054" text-anchor="middle" class="noteText">Кадровик выбирает период и нажимает кнопку.</text>
  <text x="1170" y="1078" text-anchor="middle" class="noteText">Система сама создает готовый .xlsx по шаблону.</text>
</svg>
